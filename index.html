<script type="module">
  import { initializeApp }               from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, onAuthStateChanged,
           signInWithEmailAndPassword,
           createUserWithEmailAndPassword,
           signOut, GoogleAuthProvider,
           signInWithPopup }             from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

  // ── TU CONFIG FIREBASE ─────────────────────
  // Conseguila en: https://console.firebase.google.com
  // Proyecto → Configuración → Tus apps → SDK config
  const firebaseConfig = {
    apiKey:            window.TL_FIREBASE_API_KEY      || "REEMPLAZAR",
    authDomain:        window.TL_FIREBASE_AUTH_DOMAIN  || "REEMPLAZAR.firebaseapp.com",
    projectId:         window.TL_FIREBASE_PROJECT_ID   || "REEMPLAZAR",
    storageBucket:     window.TL_FIREBASE_STORAGE      || "REEMPLAZAR.appspot.com",
    messagingSenderId: window.TL_FIREBASE_SENDER_ID    || "REEMPLAZAR",
    appId:             window.TL_FIREBASE_APP_ID       || "REEMPLAZAR",
  };
  // ───────────────────────────────────────────

  const fbApp  = initializeApp(firebaseConfig);
  const fbAuth = getAuth(fbApp);
  const googleProvider = new GoogleAuthProvider();

  // Exponer al scope global para que React lo use
  window.__fbAuth          = fbAuth;
  window.__fbSignIn        = (email, pass)  => signInWithEmailAndPassword(fbAuth, email, pass);
  window.__fbRegister      = (email, pass)  => createUserWithEmailAndPassword(fbAuth, email, pass);
  window.__fbSignOut       = ()             => signOut(fbAuth);
  window.__fbGoogleSignIn  = ()             => signInWithPopup(fbAuth, googleProvider);
  window.__fbOnAuthChange  = cb            => onAuthStateChanged(fbAuth, cb);
  window.__fbReady         = true;
</script>

/* ══════════ API HOOK ══════════ */
function useNews(page=1, category='', search='') {
  const [state, setState] = useState({ posts:[], total:0, pages:1, loading:true, error:null });

  useEffect(() => {
    setState(s => ({ ...s, loading: true, error: null }));
    const params = new URLSearchParams({ page, limit: 18 });
    if (category) params.set('category', category);
    if (search)   params.set('search', search);

    fetch(`${API}/api/news?${params}`)
      .then(r => {
        if (!r.ok) throw new Error(`API ${r.status}`);
        return r.json();
      })
      .then(d => setState({ posts: d.posts || [], total: d.pagination?.total || 0, pages: d.pagination?.pages || 1, loading: false, error: null }))
      .catch(e => setState(s => ({ ...s, loading: false, error: e.message })));
  }, [page, category, search]);

  return state;
}

function useComments(postId) {
  const [comments, setComments] = useState([]);
  const [loading, setLoading]   = useState(false);

  const load = useCallback(() => {
    if (!postId) return;
    setLoading(true);
    fetch(`${API}/api/comments?post=${postId}`)
      .then(r => r.json())
      .then(d => { setComments(d.comments || []); setLoading(false); })
      .catch(() => setLoading(false));
  }, [postId]);

  useEffect(() => { load(); }, [load]);

  const addComment = async (content, author, token) => {
    const r = await fetch(`${API}/api/comments`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        ...(token && { Authorization: `Bearer ${token}` }),
      },
      body: JSON.stringify({ post: postId, content, author }),
    });
    if (!r.ok) throw new Error('Error al publicar');
    const d = await r.json();
    setComments(c => [d.comment, ...c]);
    return d.comment;
  };

  return { comments, loading, addComment };
}

/* ══════════ TOAST ══════════ */
function Toasts({ toasts }) {
  return <div className="toasts">{toasts.map(t => <div key={t.id} className={`toast ${t.type||''}`}><span>{t.type==='ok'?'✅':'⚠️'}</span>{t.msg}</div>)}</div>;
}
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback(({ msg, type='ok' }) => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }, []);
  return { toasts, add };
}

/* ══════════ POLL ══════════ */
function Poll({ poll }) {
  const [voted, setVoted] = useState(null);
  const [vs, setVs] = useState([...poll.vs]);
  const tot = vs.reduce((a,b) => a+b, 0);
  function vote(i) { if (voted !== null) return; setVoted(i); setVs(v => v.map((x,j) => j===i?x+1:x)); }
  return (
    <div>
      <div className="poll-q">{poll.q}</div>
      {poll.opts.map((o,i) => {
        const pct = voted!==null ? Math.round(vs[i]/tot*100) : null;
        const win = voted!==null && vs[i]===Math.max(...vs);
        return (
          <div key={i} className={`po${voted===i?' voted':''}`} onClick={()=>vote(i)}>
            {pct!==null && <div className="po-bar" style={{width:pct+'%'}}/>}
            <div className="po-row"><span>{o}</span>{pct!==null && <span className={`po-pct${win?' win':''}`}>{pct}%</span>}</div>
          </div>
        );
      })}
      <div className="po-meta">{voted===null?`${tot.toLocaleString()} votos`:`✓ Voto registrado · ${tot.toLocaleString()}`}</div>
    </div>
  );
}

/* ══════════ AUTH MODAL ══════════ */
function AuthModal({ onClose, onLogin, addToast }) {
  const [tab, setTab]       = useState('login');
  const [email, setEmail]   = useState('');
  const [pass, setPass]     = useState('');
  const [uname, setUname]   = useState('');
  const [loading, setLoading] = useState(false);
  const [errMsg, setErrMsg] = useState('');

  async function handleFirebase(action) {
    if (!window.__fbReady) { addToast({ msg: 'Firebase no configurado. Usá email.', type: 'err' }); return; }
    setLoading(true); setErrMsg('');
    try {
      const cred = await action();
      const fbUser = cred.user;
      // Sincronizar con nuestro backend
      const r = await fetch(`${API}/api/auth/firebase-sync`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid: fbUser.uid, email: fbUser.email, displayName: fbUser.displayName }),
      });
      const d = await r.json();
      if (d.token) {
        localStorage.setItem('tl_token', d.token);
        onLogin({ ...d.user, isGuest: false });
        addToast({ msg: `¡Bienvenido ${d.user.displayName || d.user.username}! 🇦🇷`, type: 'ok' });
        onClose();
      }
    } catch (e) {
      setErrMsg(e.message || 'Error de autenticación');
    }
    setLoading(false);
  }

  async function handleEmailAuth(e) {
    e.preventDefault();
    setLoading(true); setErrMsg('');
    try {
      const endpoint = tab === 'login' ? '/api/auth/login' : '/api/auth/register';
      const body     = tab === 'login' ? { email, password: pass } : { email, password: pass, username: uname, displayName: uname };
      const r = await fetch(`${API}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Error');
      localStorage.setItem('tl_token', d.token);
      onLogin({ ...d.user, isGuest: false });
      addToast({ msg: `¡Bienvenido${tab==='reg'?' a Tribuna Libre':' de vuelta'}! 🇦🇷`, type: 'ok' });
      onClose();
    } catch (e) {
      setErrMsg(e.message);
    }
    setLoading(false);
  }

  function enterGuest() {
    onLogin({ name: 'Invitado', av: '?', rep: 0, isGuest: true });
    addToast({ msg: 'Entraste como invitado. Registrate para comentar y más.', type: 'ok' });
    onClose();
  }

  return (
    <div className="mbg" onClick={onClose}>
      <div className="mdl" onClick={e=>e.stopPropagation()}>
        <div className="mdl-h">
          <div className="mdl-t" style={{display:'flex',alignItems:'center',gap:9}}>
            <img src="https://raw.githubusercontent.com/bioscanrural/tribunalibre/refs/heads/main/imagenes/logochico.png"
              style={{height:36,width:36,borderRadius:'50%',border:'2px solid var(--cel)',objectFit:'cover'}}
              onError={e=>e.target.style.display='none'} alt="Logo"/>
            <span>Tribuna <span style={{color:'var(--cel)'}}>Libre</span></span>
          </div>
          <button className="cls" onClick={onClose}><Ic.X/></button>
        </div>

        <div className="auth-tabs">
          <div className={`atab${tab==='login'?' on':''}`} onClick={()=>{setTab('login');setErrMsg('');}}>Ingresar</div>
          <div className={`atab${tab==='reg'?' on':''}`} onClick={()=>{setTab('reg');setErrMsg('');}}>Registrarse</div>
        </div>

        {errMsg && <div className="err-msg">⚠️ {errMsg}</div>}

        <button className="soc-btn" onClick={()=>handleFirebase(window.__fbGoogleSignIn)} disabled={loading}>
          <span style={{fontSize:18}}>🔵</span> Continuar con Google
        </button>
        <div className="or-div">o con tu correo</div>

        <form onSubmit={handleEmailAuth}>
          {tab==='reg' && (
            <div style={{marginBottom:10}}>
              <label className="fl">Usuario</label>
              <div style={{position:'relative'}}>
                <input className="fi" value={uname} onChange={e=>setUname(e.target.value)} placeholder="mi_usuario" required style={{paddingLeft:34}}/>
                <Ic.Lock style={{width:13,height:13,position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--tx3)'}}/>
              </div>
            </div>
          )}
          <div style={{marginBottom:10}}>
            <label className="fl">Email</label>
            <div style={{position:'relative'}}>
              <input className="fi" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="vos@correo.com" required style={{paddingLeft:34}}/>
              <Ic.Mail style={{width:13,height:13,position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--tx3)'}}/>
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <label className="fl">Contraseña</label>
            <div style={{position:'relative'}}>
              <input className="fi" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required style={{paddingLeft:34}}/>
              <Ic.Lock style={{width:13,height:13,position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--tx3)'}}/>
            </div>
          </div>
          <button type="submit" className="btn btn-c" style={{width:'100%',justifyContent:'center'}} disabled={loading}>
            {loading ? 'Espera...' : tab==='login' ? 'Ingresar' : 'Crear cuenta gratis'}
          </button>
        </form>
        <div className="divhr"/>
        <button onClick={enterGuest} className="btn btn-o" style={{width:'100%',justifyContent:'center',fontSize:12}}>
          Entrar como invitado
        </button>
      </div>
    </div>
  );
}

            style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',color:'var(--cel-d)',display:'flex',alignItems:'center'}}>
            <svg style={{width:15,height:15}} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>
      </div>

      {/* Category filter */}
      <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:14,paddingBottom:3,scrollbarWidth:'none'}}>
        {['', ...cats].map(c => (
          <button key={c||'all'} onClick={()=>{setCat(c);setPage(1);}}
            style={{flexShrink:0,padding:'5px 12px',borderRadius:20,background:cat===c?'var(--cel)':'var(--white)',border:`1.5px solid ${cat===c?'var(--cel)':'var(--br)'}`,color:cat===c?'white':'var(--tx2)',fontSize:11,fontWeight:600,cursor:'pointer',transition:'.15s'}}>
            {c || 'Todos'}
          </button>
        ))}
      </div>

      {/* Error */}
      {error && (
        <div style={{background:'rgba(192,57,43,.08)',border:'1px solid rgba(192,57,43,.2)',borderRadius:'var(--r)',padding:'14px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:20}}>⚠️</span>
          <div>
            <div style={{fontWeight:700,fontSize:13,color:'#B03020'}}>No se pudo conectar con la API</div>
            <div style={{fontSize:12,color:'var(--tx2)',marginTop:3}}>Asegurate de que el servidor esté corriendo: <code style={{background:'var(--cel-xl)',padding:'1px 6px',borderRadius:4,fontSize:11}}>node server.js</code></div>
          </div>
        </div>
      )}

      {/* Cards */}
      {loading ? <SkeletonCards n={12}/> : (
        <>
          <div className="ng-grid">
            {posts.map(p => <NewsCard key={p._id} post={p} onClick={()=>onArticle(p)}/>)}
          </div>
          {posts.length === 0 && !loading && !error && (
            <div style={{textAlign:'center',padding:'40px 0',color:'var(--tx3)'}}>
              <div style={{fontSize:40,marginBottom:10}}>📭</div>
              <div>No hay noticias aún. El backend está importando…</div>
            </div>
          )}
          {/* Pagination */}
          {pages > 1 && (
            <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:20}}>
              <button className="btn btn-o btn-sm" disabled={page===1} onClick={()=>setPage(p=>p-1)}>← Anterior</button>
              <span style={{alignSelf:'center',fontSize:12,color:'var(--tx3)'}}>Página {page} de {pages}</span>
              <button className="btn btn-o btn-sm" disabled={page===pages} onClick={()=>setPage(p=>p+1)}>Siguiente →</button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ══════════ HOME ══════════ */
function HomePage({ onArticle, onNav }) {
  const { posts, loading, error } = useNews(1, '', '');
  const [liveMin, setLiveMin] = useState(67);
  useEffect(() => { const t=setInterval(()=>setLiveMin(m=>m<90?m+1:m),12000); return()=>clearInterval(t); }, []);

  const hero = posts[0];

  return (
    <div>
      {/* HERO */}
      {loading ? (
        <div className="sk" style={{height:360,borderRadius:'var(--rl)',marginBottom:20}}/>
      ) : hero ? (
        <div onClick={()=>onArticle(hero)} style={{position:'relative',borderRadius:'var(--rl)',overflow:'hidden',cursor:'pointer',marginBottom:20,border:'2px solid var(--cel)',boxShadow:'var(--sh)',transition:'.2s'}}>
          <div style={{height:360,background:'var(--cel-xl)',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
            {hero.coverImage
              ? <img src={hero.coverImage} alt={hero.title} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>e.target.style.display='none'}/>
              : <span style={{fontSize:80}}>📰</span>
            }
          </div>
          <div style={{position:'absolute',bottom:0,left:0,right:0,padding:18,background:'linear-gradient(transparent,rgba(26,39,68,.97))'}}>
            <span className="badge bc" style={{marginBottom:8,display:'inline-block'}}>{hero.category}</span>
            <div style={{fontFamily:'var(--fd)',fontSize:26,fontWeight:700,lineHeight:1.1,color:'#fff',marginBottom:7}}>{hero.title}</div>
            <div style={{fontSize:12,color:'rgba(255,255,255,.55)'}}>📡 {hero.meta?.sourceName} · {new Date(hero.publishedAt).toLocaleDateString('es-AR')}</div>
          </div>
        </div>
      ) : null}

      {/* LIVE SCORES */}
      <div className="sh"><div className="st" style={{color:'var(--red)'}}><div className="ldot"/>En Vivo</div><span className="sl" onClick={()=>onNav('live')}>Ver todo →</span></div>
      <div className="lstrip">
        {STATIC_LIVE.map(e => (
          <div key={e.id} className={`lmc${e.live?' lv':''}`} onClick={()=>onNav('live')}>
            <div className={`lms${e.live?' lv':''}`}>
              {e.live && <><div style={{width:5,height:5,borderRadius:'50%',background:'var(--red)',animation:'pulse 1.4s infinite',display:'inline-block',marginRight:3}}/> EN VIVO · </>}
              {e.id===1 ? liveMin+"'" : e.min}
            </div>
            <div className="lmt">
              <div className="ltm"><span className="lem">{e.sp}</span><div className="lnm">{e.h}</div></div>
              {e.sh!=='' ? <div className={`lsc${e.live?' lv':''}`}>{e.id===1?`2-1`:e.sh+'-'+e.sa}</div> : <div style={{fontFamily:'var(--fd)',fontSize:10,color:'var(--tx3)',textAlign:'center'}}>vs</div>}
              <div className="ltm"><span className="lem">{e.sp}</span><div className="lnm">{e.a}</div></div>
            </div>
          </div>
        ))}
      </div>

      {/* ÚLTIMAS NOTICIAS */}
      <div className="sh"><div className="st">Últimas Noticias</div><span className="sl" onClick={()=>onNav('news')}>Ver todas →</span></div>
      {loading ? <SkeletonCards n={6}/> : error ? (
        <div style={{padding:'20px',textAlign:'center',color:'var(--tx3)',fontSize:13}}>⚠️ Backend no conectado — corrí <code>node server.js</code></div>
      ) : (
        <div className="ng-grid">
          {posts.slice(1, 7).map(p => <NewsCard key={p._id} post={p} onClick={()=>onArticle(p)}/>)}
        </div>
      )}

      {/* ENCUESTA */}
      <div className="sh" style={{marginTop:18}}><div className="st">Encuesta del Día</div></div>
      <div className="card cp" style={{marginBottom:16}}><Poll poll={STATIC_POLLS[0]}/></div>
    </div>
  );
}

/* ══════════ RIGHT SIDEBAR ══════════ */
function RightSidebar({ onNav, posts=[] }) {
  return (
    <div style={{display:'flex',flexDirection:'column',gap:15}}>
      {/* Noticias más recientes */}
      {posts.length > 0 && (
        <div>
          <div className="sh"><div className="st">Más leídas</div></div>
          <div className="card cs">
            {posts.slice(0,5).map((p,i) => (
              <div key={p._id} style={{paddingBottom:9,marginBottom:9,borderBottom:'1px solid var(--br)'}}>
                <div style={{display:'flex',gap:6,marginBottom:3}}>
                  <span style={{fontFamily:'var(--fd)',fontWeight:700,color:'var(--tx3)',fontSize:14,width:18}}>{i+1}</span>
                  <div style={{fontSize:12,fontWeight:500,color:'var(--tx)',lineHeight:1.25}}>{p.title}</div>
                </div>
                <div style={{fontSize:10,color:'var(--tx3)',paddingLeft:24}}>📡 {p.meta?.sourceName}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      {/* Encuesta */}
      <div>
        <div className="sh"><div className="st">El VAR</div></div>
        <div className="card cp"><Poll poll={STATIC_POLLS[1]}/></div>
      </div>
      {/* En vivo */}
      <div>
        <div className="sh"><div className="st" style={{color:'var(--red)'}}><div className="ldot"/>En Vivo</div></div>
        {STATIC_LIVE.filter(e=>e.live).map(e => (
          <div key={e.id} className="card cs" style={{marginBottom:7,cursor:'pointer'}} onClick={()=>onNav('live')}>
            <div style={{fontSize:9,fontWeight:700,color:'var(--red)',marginBottom:4,display:'flex',alignItems:'center',gap:4}}>
              <div style={{width:5,height:5,borderRadius:'50%',background:'var(--red)',animation:'pulse 1.4s infinite'}}/>EN VIVO · {e.min}
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:12,fontWeight:500}}>{e.sp} {e.h}</span>
              <span style={{fontFamily:'var(--fd)',fontSize:16,fontWeight:700,color:'var(--red)'}}>{e.sh}-{e.sa}</span>
              <span style={{fontSize:12,fontWeight:500}}>{e.a}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════ LOGO ══════════ */
function Logo({ onClick }) {
  const [failed, setFailed] = useState(false);
  return (
    <div className="logo-w" onClick={onClick}>
      <img className="logo-img"
        src="https://raw.githubusercontent.com/bioscanrural/tribunalibre/refs/heads/main/imagenes/logochico.png"
        alt="Tribuna Libre" onError={()=>setFailed(true)}
        style={{display:failed?'none':'block'}}
      />
      {failed && (
        <div className="logo-img" style={{background:'var(--cel)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--fd)',fontSize:16,fontWeight:700,color:'white',letterSpacing:1}}>TL</div>
      )}
      <div className="logo-txt">
        <div className="logo-main">Tribuna Libre</div>
        <div className="logo-sub">Red de Periodismo <b>Deportivo</b></div>
      </div>
    </div>
  );
}

/* ══════════ APP ══════════ */
const NAV = [
  {id:'home',l:'Inicio',icon:'Home'},{id:'news',l:'Noticias',icon:'News'},
  {id:'live',l:'En Vivo',icon:'Live'},{id:'stream',l:'Streaming',icon:'Stream'},
  {id:'forum',l:'Debates',icon:'Forum'},{id:'profile',l:'Mi perfil',icon:'Profile'},
];
const MOBILE_NAV = [
  {id:'home',l:'Inicio',icon:'Home'},{id:'news',l:'Noticias',icon:'News'},
  {id:'live',l:'En Vivo',icon:'Live'},{id:'forum',l:'Debates',icon:'Forum'},
  {id:'profile',l:'Perfil',icon:'Profile'},
];

function App() {
  const [page, setPage]       = useState('home');
  const [article, setArticle] = useState(null);
  const [user, setUser]       = useState({ isGuest: true });
  const [authOpen, setAuthOpen] = useState(false);
  const { toasts, add: addToast } = useToasts();
  const { posts } = useNews(1, '', '');

  // Restaurar sesión al cargar
  useEffect(() => {
    const token = localStorage.getItem('tl_token');
    if (!token) return;
    fetch(`${API}/api/auth/me`, { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d?.user) setUser({ ...d.user, isGuest: false }); })
      .catch(() => localStorage.removeItem('tl_token'));
  }, []);

  // Firebase auth listener
  useEffect(() => {
    if (!window.__fbOnAuthChange) return;
    window.__fbOnAuthChange(fbUser => {
      if (!fbUser) return;
      const token = localStorage.getItem('tl_token');
      if (!token) { // Sincronizar si hay sesión Firebase pero no JWT
        fetch(`${API}/api/auth/firebase-sync`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ uid:fbUser.uid, email:fbUser.email, displayName:fbUser.displayName }),
        }).then(r=>r.json()).then(d => {
          if (d.token) { localStorage.setItem('tl_token', d.token); setUser({ ...d.user, isGuest: false }); }
        }).catch(()=>{});
      }
    });
  }, []);

  function nav(p) { setPage(p); setArticle(null); window.scrollTo(0,0); }
  function openArticle(p) { setArticle(p); setPage('article'); window.scrollTo(0,0); }
  function logout() {
    localStorage.removeItem('tl_token');
    if (window.__fbSignOut) window.__fbSignOut().catch(()=>{});
    setUser({ isGuest: true });
    addToast({ msg: 'Sesión cerrada', type: 'ok' });
    nav('home');
  }

  return (
    <>
      <Toasts toasts={toasts}/>
      <div className="flag-stripe"/>
      {/* HEADER */}
      <div className="hdr">
        <Logo onClick={()=>nav('home')}/>
        <div className="ticker">
          <div className="tk-tr">
            {[...STATIC_TICKER,...STATIC_TICKER].map((t,i)=><div key={i} className="tk-it"><b>{t.l}</b>{t.t}</div>)}
          </div>
        </div>
        <div className="hdr-r">
          <button className="hib" onClick={()=>addToast({msg:'Sin notificaciones',type:'ok'})}><Ic.Bell/></button>
          {user.isGuest ? (
            <button className="sign-btn" onClick={()=>setAuthOpen(true)}>Ingresar / Registrarse</button>
          ) : (
            <div className="usr-btn" onClick={()=>nav('profile')}>
              <div className="usr-av">{(user.displayName||user.username||'U')[0].toUpperCase()}</div>
              <span className="usr-nm">{user.displayName||user.username}</span>
            </div>
          )}
        </div>
      </div>

      <div className="shell">
        {/* LEFT NAV */}
        <nav className="lnav">
          <div className="nl-live" onClick={()=>nav('live')}>
            <div className="ldot"/><span className="nl-live-t">EN VIVO</span><span className="nl-live-c">3</span>
          </div>
          <div className="ng">
            <span className="nlbl">Navegación</span>
            {NAV.map(n=>{const Icon=Ic[n.icon];return(
              <div key={n.id} className={`nl${page===n.id||(page==='article'&&n.id==='news')?' on':''}`} onClick={()=>nav(n.id)}>
                <Icon/><span>{n.l}</span>
              </div>
            );})}
          </div>
          <div className="nav-hr"/>
          <div className="ng">
            <span className="nlbl">Equipos</span>
            {[['🔴','River Plate'],['🔵','Boca Juniors'],['⚡','Racing Club'],['🏉','Los Pumas']].map(([em,nm],i)=>(
              <div key={i} className="nl"><span style={{fontSize:14,width:20,textAlign:'center'}}>{em}</span>{nm}</div>
            ))}
          </div>
          {!user.isGuest && (
            <>
              <div className="nav-hr"/>
              <div className="ng">
                <div className="nl" onClick={logout} style={{color:'var(--red)'}}>
                  <Ic.X style={{width:13,height:13}}/> Cerrar sesión
                </div>
              </div>
            </>
          )}
        </nav>

        {/* MAIN */}
        <main className="main">
          <div style={{maxWidth:760, margin:'0 auto'}}>
            {page==='home'    && <HomePage onArticle={openArticle} onNav={nav}/>}
            {page==='news'    && <NewsPage onArticle={openArticle}/>}
            {page==='article' && article && <ArticlePage post={article} onBack={()=>nav('news')} user={user} addToast={addToast}/>}
            {page==='live'    && (
              <div>
                <div className="sh"><div className="st" style={{color:'var(--red)'}}><div className="ldot"/>En Vivo</div></div>
                <div className="lstrip">
                  {STATIC_LIVE.map(e=>(
                    <div key={e.id} className={`lmc${e.live?' lv':''}`}>
                      <div className={`lms${e.live?' lv':''}`}>{e.live&&<><div style={{width:5,height:5,borderRadius:'50%',background:'var(--red)',animation:'pulse 1.4s infinite',display:'inline-block',marginRight:3}}/>EN VIVO · </>}{e.min}</div>
                      <div className="lmt">
                        <div className="ltm"><span className="lem">{e.sp}</span><div className="lnm">{e.h}</div></div>
                        {e.sh!==''?<div className={`lsc${e.live?' lv':''}`}>{e.sh}-{e.sa}</div>:<div style={{fontFamily:'var(--fd)',fontSize:10,color:'var(--tx3)',textAlign:'center'}}>vs</div>}
                        <div className="ltm"><span className="lem">{e.sp}</span><div className="lnm">{e.a}</div></div>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="card cp"><Poll poll={STATIC_POLLS[0]}/></div>
              </div>
            )}
            {page==='forum' && (
              <div>
                <div className="sh"><div className="st">Debates</div></div>
                <div style={{padding:'30px',textAlign:'center',color:'var(--tx3)',fontSize:13}}>
                  <div style={{fontSize:40,marginBottom:10}}>💬</div>
                  Sección de debates — próximamente con hilos en tiempo real.
                </div>
                <div className="sh" style={{marginTop:16}}><div className="st">Encuestas</div></div>
                {STATIC_POLLS.map(p=><div key={p.id} className="card cp" style={{marginBottom:12}}><Poll poll={p}/></div>)}
              </div>
            )}
            {page==='stream' && (
              <div>
                <div className="sh"><div className="st">Streaming</div></div>
                <div style={{padding:'30px',textAlign:'center',color:'var(--tx3)',fontSize:13}}>
                  <div style={{fontSize:40,marginBottom:10}}>📡</div>
                  Sección de streaming — integración con plataformas en proceso.
                </div>
              </div>
            )}
            {page==='profile' && (
              <div>
                <div style={{background:'linear-gradient(135deg,var(--cel-d),var(--cel))',borderRadius:'var(--rl)',padding:24,textAlign:'center',marginBottom:16}}>
                  <div style={{width:70,height:70,borderRadius:'50%',background:'rgba(255,255,255,.2)',margin:'0 auto 12px',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--fd)',fontSize:28,fontWeight:700,color:'white',border:'2.5px solid rgba(255,255,255,.4)'}}>
                    {user.isGuest ? '?' : (user.displayName||user.username||'U')[0].toUpperCase()}
                  </div>
                  <div style={{fontFamily:'var(--fd)',fontSize:22,fontWeight:700,color:'white',marginBottom:5}}>
                    {user.isGuest ? 'Invitado' : (user.displayName||user.username)}
                  </div>
                  {user.isGuest ? (
                    <button className="btn btn-sm" style={{background:'rgba(255,255,255,.2)',border:'1.5px solid rgba(255,255,255,.5)',color:'white',borderRadius:30}} onClick={()=>setAuthOpen(true)}>Crear cuenta gratis</button>
                  ) : (
                    <div style={{fontSize:13,color:'rgba(255,255,255,.75)'}}>{user.email}</div>
                  )}
                </div>
                {!user.isGuest && (
                  <button className="btn btn-red btn-sm" onClick={logout} style={{marginBottom:12}}>Cerrar sesión</button>
                )}
              </div>
            )}
          </div>
        </main>

        {/* RIGHT SIDEBAR */}
        <aside className="rsb"><RightSidebar onNav={nav} posts={posts}/></aside>
      </div>

      {/* MOBILE BOTTOM NAV */}
      <div className="bnav">
        {MOBILE_NAV.map(n=>{const Icon=Ic[n.icon];return(
          <div key={n.id} className={`bni${page===n.id?' on':''}`} onClick={()=>nav(n.id)}>
            <Icon/><span>{n.l}</span>
          </div>
        );})}
      </div>

      {/* AUTH MODAL */}
      {authOpen && <AuthModal onClose={()=>setAuthOpen(false)} onLogin={setUser} addToast={addToast}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
