<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TRIBUNALIBRE — Deportes Argentina</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ═══════════════════════════════════
   THEME SYSTEM
═══════════════════════════════════ */
:root{
  --bg:#08080E;--surf:#10101A;--card:#161622;--card2:#1D1D2C;--card3:#232335;
  --acc:#E8262A;--acc2:#16A34A;--gold:#F59E0B;--blue:#3B82F6;--purple:#8B5CF6;
  --tx:#EEEEF5;--tx2:#9090B8;--tx3:#444460;
  --br:rgba(255,255,255,.06);--brm:rgba(255,255,255,.11);
  --mn:#0D0D17;--mac:#E8262A;--mt:#5858A0;
  --tbg:rgba(8,8,14,.96);--sh:0 8px 32px rgba(0,0,0,.5);
  --r:10px;--rs:7px;--rl:16px;--fw:'DM Sans',sans-serif;--fd:'Oswald',sans-serif;
}
[data-theme=light]{
  --bg:#F0F2F8;--surf:#FFF;--card:#FFF;--card2:#F5F7FC;--card3:#ECF0F8;
  --tx:#12122A;--tx2:#4A4A7A;--tx3:#9999BB;
  --br:rgba(0,0,0,.07);--brm:rgba(0,0,0,.13);
  --mn:#FFF;--mac:#D42B2E;--mt:#8888AA;
  --tbg:rgba(255,255,255,.97);--sh:0 4px 24px rgba(0,0,0,.1);
}
[data-theme=pastel]{
  --bg:#EDF0FF;--surf:#FFF;--card:#FFF;--card2:#F0F3FF;--card3:#E8ECFF;
  --acc:#6366F1;--acc2:#10B981;--tx:#1E1B4B;--tx2:#6060A0;--tx3:#9898C0;
  --br:rgba(99,102,241,.1);--brm:rgba(99,102,241,.2);
  --mn:#FFF;--mac:#6366F1;--mt:#9090C0;
  --tbg:rgba(255,255,255,.96);--sh:0 4px 24px rgba(99,102,241,.15);
}
[data-theme=night]{
  --bg:#030308;--surf:#08080F;--card:#0E0E18;--card2:#131320;--card3:#181827;
  --acc:#C0392B;--tx:#D8D8F0;--tx2:#707090;--tx3:#303050;
  --mn:#06060E;--mac:#C0392B;--mt:#404060;
  --tbg:rgba(3,3,8,.98);
}

/* ═══════════════════════════════════ BASE ═══════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:var(--fw);min-height:100vh;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;font-size:14px}
h1,h2,h3,h4{font-family:var(--fd)}
button{cursor:pointer;border:none;outline:none;font-family:var(--fw)}
input,textarea,select{outline:none;font-family:var(--fw);color:var(--tx);background:transparent}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--brm);border-radius:3px}
::selection{background:var(--acc);color:#fff}

/* ═══════════════════════════════════ TOPBAR ═══════════════════════════════════ */
.tb{position:fixed;top:0;left:0;right:0;height:50px;background:var(--tbg);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--br);
  display:flex;align-items:center;padding:0 12px;gap:10px;z-index:300}
.logo{font-family:var(--fd);font-size:19px;font-weight:700;letter-spacing:3px;
  cursor:pointer;display:flex;align-items:center;gap:0;flex-shrink:0;user-select:none}
.lr{color:var(--acc)}.lw{color:var(--tx)}
.lbar{width:2px;height:15px;background:var(--acc);border-radius:2px;margin:0 3px}
.ticker{flex:1;overflow:hidden;border-left:2px solid var(--acc);padding-left:8px;min-width:0}
.tk-tr{display:flex;gap:28px;animation:tick 30s linear infinite;white-space:nowrap}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tk-it{font-size:11px;color:var(--tx2);flex-shrink:0}
.tk-it b{color:var(--acc);font-size:10px;margin-right:4px}
.tb-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ib{width:30px;height:30px;border-radius:var(--rs);background:transparent;
  color:var(--tx2);display:flex;align-items:center;justify-content:center;transition:.15s;position:relative}
.ib:hover{background:var(--card2);color:var(--tx)}
.ib svg{width:16px;height:16px}
.ndot{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;
  background:var(--acc);border:1.5px solid var(--tbg)}
.av-sm{width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;font-weight:700;
  font-size:10px;cursor:pointer;font-family:var(--fd);letter-spacing:1px;color:#fff}
.th-pick{height:26px;border-radius:20px;padding:0 10px;font-size:11px;font-weight:600;
  background:var(--card2);border:1px solid var(--brm);color:var(--tx2);
  display:flex;align-items:center;gap:5px;transition:.15s;position:relative}
.th-pick:hover{border-color:var(--acc);color:var(--tx)}
.th-drop{position:absolute;top:calc(100% + 5px);right:0;background:var(--surf);
  border:1px solid var(--brm);border-radius:var(--r);padding:4px;z-index:400;
  min-width:115px;box-shadow:var(--sh)}
.th-opt{padding:6px 12px;border-radius:var(--rs);cursor:pointer;font-size:12px;
  font-weight:500;transition:.12s}
.th-opt:hover{background:var(--card2)}
.th-opt.on{background:var(--card3)}

/* ═══════════════════════════════════ SHELL ═══════════════════════════════════ */
.shell{display:flex;margin-top:50px;min-height:calc(100vh - 50px)}

/* LEFT SIDEBAR */
.lsb{width:192px;flex-shrink:0;position:sticky;top:50px;height:calc(100vh - 50px);
  overflow-y:auto;background:var(--mn);border-right:1px solid var(--br);
  padding:10px 0;display:none;flex-direction:column;scrollbar-width:none}
@media(min-width:860px){.lsb{display:flex}}
.ng{padding:0 8px;margin-bottom:4px}
.nlbl{font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:1.5px;
  text-transform:uppercase;padding:0 5px;margin-bottom:3px}
.nl{display:flex;align-items:center;gap:7px;padding:6px 7px;border-radius:var(--rs);
  cursor:pointer;color:var(--mt);font-size:12.5px;font-weight:500;transition:.15s;margin-bottom:1px}
.nl:hover{background:var(--card2);color:var(--tx)}
.nl.on{background:var(--mac);color:#fff}
.nl svg{width:14px;height:14px;flex-shrink:0}
.nl-badge{margin-left:auto;background:var(--acc);color:#fff;
  font-size:9px;border-radius:10px;padding:1px 5px;font-weight:700}
.lsb-hr{height:1px;background:var(--br);margin:6px 10px}
.lv-pill{display:flex;align-items:center;gap:6px;margin:4px 8px 6px;padding:7px 9px;
  background:rgba(232,38,42,.1);border:1px solid rgba(232,38,42,.22);
  border-radius:var(--rs);cursor:pointer;transition:.15s}
.lv-pill:hover{border-color:rgba(232,38,42,.4)}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:pulse 1.4s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.5)}}
.lv-txt{font-size:11px;font-weight:700;color:var(--acc);font-family:var(--fd);letter-spacing:.5px}
.lv-ct{font-size:10px;color:rgba(232,38,42,.55);margin-left:auto}
.tm-row{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:var(--rs);cursor:pointer;transition:.15s}
.tm-row:hover{background:var(--card2)}
.tm-em{font-size:13px;width:20px;text-align:center}
.tm-nm{font-size:11.5px;font-weight:500;color:var(--tx2);line-height:1.1}
.tm-nm small{display:block;font-size:9px;color:var(--tx3);font-weight:400}

/* MAIN */
.main{flex:1;min-width:0;padding:18px 14px}
@media(min-width:860px){.main{padding:20px 22px}}

/* RIGHT SIDEBAR */
.rsb{width:288px;flex-shrink:0;position:sticky;top:50px;height:calc(100vh - 50px);
  overflow-y:auto;padding:16px 13px;border-left:1px solid var(--br);
  display:none;background:var(--bg);scrollbar-width:none}
@media(min-width:1200px){.rsb{display:block}}

/* MOBILE NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;height:50px;background:var(--mn);
  border-top:1px solid var(--br);display:flex;align-items:center;z-index:300}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:5px 2px;cursor:pointer;color:var(--mt);transition:.15s}
.bni.on{color:var(--mac)}
.bni svg{width:17px;height:17px}
.bni span{font-size:9px;font-weight:600;font-family:var(--fd);letter-spacing:.3px}
@media(min-width:860px){.bnav{display:none}}
@media(max-width:859px){body{padding-bottom:50px}}

/* ═══════════════════════════════════ ATOMS ═══════════════════════════════════ */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--br)}
.cp{padding:14px}.cs{padding:10px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.st{font-family:var(--fd);font-size:13px;font-weight:600;text-transform:uppercase;
  letter-spacing:1.2px;display:flex;align-items:center;gap:7px;color:var(--tx)}
.st::before{content:'';width:3px;height:13px;background:var(--acc);border-radius:2px;display:inline-block}
.sl{font-size:11px;color:var(--tx2);cursor:pointer;transition:.15s}
.sl:hover{color:var(--acc)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;
  font-size:9px;font-weight:700;font-family:var(--fd);letter-spacing:.8px;text-transform:uppercase}
.br-b{background:rgba(232,38,42,.12);color:#FF6668;border:1px solid rgba(232,38,42,.25)}
.bg-b{background:rgba(22,163,74,.12);color:#4ADE80;border:1px solid rgba(22,163,74,.25)}
.bb-b{background:rgba(59,130,246,.12);color:#93C5FD;border:1px solid rgba(59,130,246,.25)}
.bp-b{background:rgba(245,158,11,.12);color:#FCD34D;border:1px solid rgba(245,158,11,.25)}
.bv-b{background:rgba(139,92,246,.12);color:#C4B5FD;border:1px solid rgba(139,92,246,.25)}
.btn{padding:7px 14px;border-radius:var(--rs);font-size:12px;font-weight:500;transition:.15s;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-r{background:var(--acc);color:#fff}.btn-r:hover{opacity:.88}
.btn-g{background:transparent;border:1px solid var(--brm);color:var(--tx2)}
.btn-g:hover{border-color:var(--acc);color:var(--tx)}
.btn-bl{background:var(--blue);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px}
.fi{background:var(--card2);border:1px solid var(--brm);border-radius:var(--rs);
  padding:8px 11px;font-size:13px;color:var(--tx);width:100%;transition:.15s}
.fi:focus{border-color:var(--acc)}
.fi::placeholder{color:var(--tx3)}
.fl{display:block;font-size:10px;font-weight:700;color:var(--tx3);
  letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.div-hr{height:1px;background:var(--br);margin:12px 0}

/* ═══════════════════════════════════ LIVE DOT ═══════════════════════════════════ */
.ld-b{width:7px;height:7px;border-radius:50%;background:var(--acc);animation:pulse 1.4s infinite;flex-shrink:0}

/* ═══════════════════════════════════ MODAL ═══════════════════════════════════ */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:16px;
  backdrop-filter:blur(8px)}
.mdl{background:var(--surf);border-radius:var(--rl);border:1px solid var(--brm);
  padding:22px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto}
.mdl-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mdl-t{font-family:var(--fd);font-size:18px;font-weight:600}
.cls-btn{width:26px;height:26px;border-radius:50%;background:var(--card2);
  display:flex;align-items:center;justify-content:center;color:var(--tx2)}
.cls-btn:hover{background:var(--acc);color:#fff}
.cls-btn svg{width:13px;height:13px}

/* ═══════════════════════════════════ AUTH MODAL ═══════════════════════════════════ */
.auth-tabs{display:flex;background:var(--card2);border-radius:var(--rs);padding:3px;margin-bottom:18px}
.atab{flex:1;padding:7px;text-align:center;border-radius:var(--rs);font-size:12px;
  font-weight:700;cursor:pointer;color:var(--tx2);transition:.15s;font-family:var(--fd)}
.atab.on{background:var(--acc);color:#fff}
.social-btn{width:100%;padding:10px;border-radius:var(--rs);border:1px solid var(--brm);
  background:var(--card2);color:var(--tx);display:flex;align-items:center;
  justify-content:center;gap:10px;font-size:13px;font-weight:500;margin-bottom:8px;transition:.15s}
.social-btn:hover{border-color:var(--brm);background:var(--card3)}
.or-div{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--tx3);font-size:11px}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--br)}
.guest-banner{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(59,130,246,.07));
  border:1px solid rgba(99,102,241,.2);border-radius:var(--r);padding:12px 14px;
  margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.gb-text{flex:1;font-size:12px;color:var(--tx2);min-width:140px;line-height:1.5}
.gb-text b{color:var(--tx);font-size:13px;display:block;margin-bottom:2px}
.user-badge{display:flex;align-items:center;gap:6px;padding:5px 10px;
  background:var(--card2);border-radius:20px;border:1px solid var(--brm)}
.ub-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:9px;font-family:var(--fd);color:#fff}

/* ═══════════════════════════════════ CARDS ═══════════════════════════════════ */
.nc{background:var(--card);border-radius:var(--r);border:1px solid var(--br);
  overflow:hidden;cursor:pointer;transition:.18s;display:flex;flex-direction:column}
.nc:hover{border-color:rgba(232,38,42,.35);transform:translateY(-2px);box-shadow:var(--sh)}
.nt{display:flex;align-items:center;justify-content:center;font-size:48px;
  background:linear-gradient(135deg,var(--card2),var(--card3))}
.nt.big{height:160px}.nt.sm{height:110px}
.nb{padding:11px;flex:1;display:flex;flex-direction:column}
.ntit{font-family:var(--fd);font-size:15px;font-weight:500;line-height:1.2;margin-bottom:5px}
.nexc{font-size:11px;color:var(--tx2);line-height:1.5;margin-bottom:8px;flex:1}
.nft{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--tx3);padding-top:8px;border-top:1px solid var(--br);margin-top:auto}
.nac{display:flex;gap:8px}
.abt{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--tx2);background:none;transition:.15s;padding:0}
.abt:hover,.abt.lk{color:var(--acc)}
.abt svg{width:12px;height:12px}
/* hero */
.hero{position:relative;border-radius:var(--rl);overflow:hidden;cursor:pointer;
  margin-bottom:16px;border:1px solid var(--br);transition:.2s}
.hero:hover{border-color:rgba(232,38,42,.3)}
.hero-img{height:340px;display:flex;align-items:center;justify-content:center;font-size:88px;
  background:linear-gradient(135deg,var(--card2),var(--card3))}
@media(min-width:860px){.hero-img{height:420px}}
.hero-ov{position:absolute;bottom:0;left:0;right:0;padding:18px;
  background:linear-gradient(transparent,rgba(4,4,10,.97))}
.hero-tit{font-family:var(--fd);font-size:24px;font-weight:700;line-height:1.1;color:#fff;margin-bottom:7px}
@media(min-width:860px){.hero-tit{font-size:34px}}

/* ═══════════════════════════════════ LIVE CARDS ═══════════════════════════════════ */
.lmc{background:var(--card);border:1px solid var(--br);border-radius:var(--r);
  padding:10px 13px;cursor:pointer;flex-shrink:0;min-width:165px;transition:.15s}
.lmc:hover,.lmc.sel{border-color:rgba(232,38,42,.4)}
.lmc.lv{border-color:rgba(232,38,42,.25);background:rgba(232,38,42,.04)}
.lms{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--tx3);margin-bottom:7px}
.lms.lv{color:var(--acc)}
.lmt{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ltm{text-align:center;flex:1}
.lem{font-size:20px;display:block;margin-bottom:2px}
.lnm{font-size:10px;color:var(--tx2);font-weight:500}
.lsc{font-family:var(--fd);font-size:24px;font-weight:700;min-width:40px;text-align:center}
.lsc.lv{color:var(--acc)}

/* ═══════════════════════════════════ CHAT ═══════════════════════════════════ */
.chat-wrap{border-radius:var(--r);border:1px solid var(--br);overflow:hidden;background:var(--card)}
.ch-hd{padding:10px 13px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:7px;background:var(--card2)}
.ch-bd{height:260px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:5px}
.cmsg{padding:6px 10px;border-radius:8px;max-width:80%;font-size:12px;line-height:1.4}
.cmsg.own{background:var(--acc);margin-left:auto;border-bottom-right-radius:3px}
.cmsg.other{background:var(--card3);border-bottom-left-radius:3px}
.cmsg-u{font-size:9px;font-weight:700;opacity:.6;margin-bottom:2px}
.cmsg-vid{border-radius:6px;overflow:hidden;margin-top:4px;max-width:220px}
.cmsg-vid video{width:100%;display:block;border-radius:6px}
.cmsg-vid-ph{background:rgba(0,0,0,.4);padding:8px;border-radius:6px;display:flex;align-items:center;gap:6px;font-size:11px}
.ch-inp{padding:8px;border-top:1px solid var(--br);display:flex;gap:6px;background:var(--card2);flex-wrap:wrap}
.ch-txt{flex:1;min-width:100px;background:var(--card);border:1px solid var(--brm);border-radius:var(--rs);padding:6px 10px;font-size:12px}
.ch-txt:focus{border-color:var(--acc)}
.ch-snd{background:var(--acc);border-radius:var(--rs);padding:6px 10px;color:#fff;display:flex;align-items:center;transition:.15s}
.ch-snd:hover{opacity:.88}
.ch-snd svg{width:14px;height:14px}
.emoji-bar{padding:5px 7px;border-top:1px solid var(--br);background:var(--card2);display:flex;gap:3px;flex-wrap:wrap}
.ej-btn{font-size:17px;background:none;padding:2px;border-radius:4px;transition:.15s}
.ej-btn:hover{background:var(--card3);transform:scale(1.2)}

/* ═══════════════════════════════════ POLL ═══════════════════════════════════ */
.po{background:var(--card2);border-radius:var(--rs);padding:9px 12px;margin-bottom:6px;
  cursor:pointer;border:1px solid var(--br);position:relative;overflow:hidden;transition:.15s}
.po:hover{border-color:rgba(232,38,42,.3)}
.po.voted{border-color:var(--acc2)}
.po-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(232,38,42,.1);transition:width .7s ease}
.po.voted .po-bar{background:rgba(22,163,74,.12)}
.po-row{position:relative;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:500}
.po-pct{font-weight:700;font-size:11px;color:var(--tx2)}
.po-pct.win{color:var(--acc2)}
.po-meta{font-size:10px;color:var(--tx3);margin-top:6px}

/* ═══════════════════════════════════ THREAD CARD ═══════════════════════════════════ */
.tc{background:var(--card);border-radius:var(--r);border:1px solid var(--br);
  padding:12px 13px;margin-bottom:8px;cursor:pointer;transition:.15s}
.tc:hover{border-color:rgba(232,38,42,.3);transform:translateX(3px)}
.tc-tit{font-family:var(--fd);font-size:15px;font-weight:500;margin-bottom:5px;line-height:1.2}
.tc-mt{display:flex;align-items:center;gap:10px;font-size:10px;color:var(--tx3)}
.tc-st{display:flex;align-items:center;gap:3px}
.tc-st svg{width:11px;height:11px}

/* ═══════════════════════════════════ REP ═══════════════════════════════════ */
.rep-card{background:var(--card);border:1px solid var(--br);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.rep-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.rep-tit{font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
.rep-sc{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--gold)}
.rep-bg{height:5px;background:var(--card3);border-radius:5px;overflow:hidden}
.rep-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--acc),var(--gold));transition:width 1s}
.rep-lv{display:flex;justify-content:space-between;font-size:9px;color:var(--tx3);margin-top:4px}

.tri{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--br);cursor:pointer}
.tri:last-child{border-bottom:none}
.tri:hover .trn{color:var(--acc)}
.trnum{font-family:var(--fd);font-size:16px;font-weight:700;color:var(--tx3);width:18px}
.trnum.hot{color:var(--acc)}
.trn{font-size:11.5px;font-weight:500;transition:.15s}
.trc{font-size:10px;color:var(--tx3);margin-top:1px}

/* ═══════════════════════════════════ NEWS GRID ═══════════════════════════════════ */
.ng-grid{display:grid;gap:12px;grid-template-columns:1fr}
@media(min-width:540px){.ng-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1400px){.ng-grid{grid-template-columns:1fr 1fr 1fr}}

/* TOAST */
.toasts{position:fixed;top:58px;right:12px;z-index:600;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--card);border:1px solid var(--brm);border-radius:var(--r);
  padding:9px 13px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px;
  box-shadow:var(--sh);animation:tin .3s ease;min-width:190px}

.clr-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.clr-lbl{font-size:12px;color:var(--tx2);flex:1}
.clr-in{width:32px;height:32px;border-radius:7px;border:2px solid var(--brm);cursor:pointer;padding:2px}
.clr-txt{background:var(--card2);border:1px solid var(--brm);border-radius:6px;

.preset-btn:hover,.preset-btn.on{border-color:var(--tx)}
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--br)}
.tog-row:last-child{border-bottom:none}
.tog-lbl{font-size:12px}
.tog{width:34px;height:18px;border-radius:18px;background:var(--card3);

.tog.on{background:var(--acc2)}
.tog::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;

.tog.on::after{transform:translateX(16px)}

.stab:hover{border-color:var(--acc);color:var(--tx)}

.fi-ico{font-size:20px;width:32px;text-align:center}
.fi-info{flex:1}
.fi-name{font-weight:600;font-size:13px;margin-bottom:2px}
.fi-url{font-size:10px;color:var(--tx3)}
.fi-stat{font-size:10px;margin-top:3px;display:flex;align-items:center;gap:4px}
.ftog{width:30px;height:17px;border-radius:17px;background:var(--card3);

.ftog.on{background:var(--acc2)}
.ftog::after{content:'';position:absolute;width:11px;height:11px;border-radius:50%;

.ftog.on::after{transform:translateX(13px)}

.aiq{background:var(--card2);border-radius:var(--r);border:1px solid var(--br);padding:13px;margin-bottom:9px}
.aiq-tit{font-family:var(--fd);font-size:14px;font-weight:600;margin-bottom:4px}
.aiq-sum{font-size:12px;color:var(--tx2);line-height:1.5;margin-bottom:9px}
.aiq-acts{display:flex;gap:7px;flex-wrap:wrap}

.pnm{font-family:var(--fd);font-size:22px;font-weight:600;margin-bottom:3px}
.pbio{font-size:12px;color:var(--tx2);margin-bottom:10px}
.psts{display:flex;gap:20px;justify-content:center}
.psn{font-family:var(--fd);font-size:20px;font-weight:700}
.psl{font-size:10px;color:var(--tx3)}

/* ═══════════ COMPONENTS ═══════════ */
function Toast({toasts}){
  return<div className="toasts">{toasts.map(t=><div key={t.id} className="toast"><span>{t.em||'✓'}</span>{t.msg}</div>)}</div>;
}

function Poll({poll}){
  const[voted,setVoted]=useState(null);
  const[vs,setVs]=useState([...poll.vs]);
  const tot=vs.reduce((a,b)=>a+b,0);
  function vote(i){if(voted!==null)return;setVoted(i);setVs(v=>v.map((x,j)=>j===i?x+1:x));}
  return(
    <div>
      <div style={{fontWeight:600,fontSize:13,marginBottom:9,lineHeight:1.4,color:'var(--tx)'}}>{poll.q}</div>
      {poll.opts.map((o,i)=>{
        const pct=voted!==null?Math.round(vs[i]/tot*100):null;
        const win=voted!==null&&vs[i]===Math.max(...vs);
        return(
          <div key={i} className={`po${voted===i?' voted':''}`} onClick={()=>vote(i)}>
            {pct!==null&&<div className="po-bar" style={{width:pct+'%'}}/>}
            <div className="po-row"><span>{o}</span>{pct!==null&&<span className={`po-pct${win?' win':''}`}>{pct}%</span>}</div>
          </div>
        );
      })}
      <div className="po-meta">{voted===null?`${tot.toLocaleString()} votos`:`✓ ${tot.toLocaleString()} votos`}</div>
    </div>
  );
}

/* ═══════════ TACTICAL BOARD ═══════════ */
function TacticBoard({onSave,onClose}){
  const cRef=useRef();const[tool,setTool]=useState('draw');const[color,setColor]=useState('#FF4444');
  const[drawing,setDrawing]=useState(false);const[paths,setPaths]=useState([]);const[cur,setCur]=useState([]);
  const COLORS=['#FF4444','#FFD700','#44FF88','#4488FF','#FF44AA','#FFFFFF'];
  const TOOLS=[{id:'draw',l:'✏️ Trazar'},{id:'arrow',l:'→ Flecha'}];
  function getXY(e){
    const r=cRef.current.getBoundingClientRect();
    const src=e.touches?.[0]||e;
    return{x:src.clientX-r.left,y:src.clientY-r.top};
  }
  function onDown(e){setDrawing(true);const p=getXY(e);setCur([p]);}
  function onMove(e){if(!drawing)return;const p=getXY(e);setCur(c=>[...c,p]);redraw();}
  function onUp(){if(!drawing)return;setDrawing(false);if(cur.length>1)setPaths(p=>[...p,{pts:cur,color,type:tool}]);setCur([]);}
  function redraw(){
    const cv=cRef.current;if(!cv)return;
    const ctx=cv.getContext('2d');const w=cv.width,h=cv.height;
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle='#1a6b2a';ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;
    ctx.strokeRect(8,8,w-16,h-16);
    ctx.beginPath();ctx.arc(w/2,h/2,h*.12,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w/2,8);ctx.lineTo(w/2,h-8);ctx.stroke();
    [[{x:.5,y:.9}],[{x:.15,y:.72},{x:.35,y:.72},{x:.65,y:.72},{x:.85,y:.72}],[{x:.2,y:.5},{x:.5,y:.45},{x:.8,y:.5}],[{x:.25,y:.25},{x:.5,y:.18},{x:.75,y:.25}]].flat().forEach((p,i)=>{
      const px=p.x*w,py=p.y*h;
      ctx.beginPath();ctx.arc(px,py,w*.027,0,Math.PI*2);
      ctx.fillStyle='#1D4ED8';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font=`bold ${w*.023}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText([1,2,5,4,3,8,10,6,11,9,7][i]||i,px,py);
    });
    [...paths,cur.length>1?{pts:cur,color,type:tool}:null].filter(Boolean).forEach(path=>{
      if(path.pts.length<2)return;
      ctx.beginPath();ctx.moveTo(path.pts[0].x,path.pts[0].y);
      path.pts.forEach(pt=>ctx.lineTo(pt.x,pt.y));
      ctx.strokeStyle=path.color;ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
      if(path.type==='arrow'){
        const last=path.pts[path.pts.length-1];const prev=path.pts[Math.max(0,path.pts.length-2)];
        const ang=Math.atan2(last.y-prev.y,last.x-prev.x);
        ctx.beginPath();ctx.moveTo(last.x,last.y);
        ctx.lineTo(last.x-13*Math.cos(ang-.4),last.y-13*Math.sin(ang-.4));
        ctx.lineTo(last.x-13*Math.cos(ang+.4),last.y-13*Math.sin(ang+.4));
        ctx.closePath();ctx.fillStyle=path.color;ctx.fill();
      }
    });
  }
  useEffect(()=>{redraw();},[paths,cur]);
  useEffect(()=>{
    const cv=cRef.current;if(!cv)return;
    const resize=()=>{cv.width=cv.offsetWidth;cv.height=cv.offsetWidth*.62;redraw();};
    resize();window.addEventListener('resize',resize);return()=>window.removeEventListener('resize',resize);
  },[]);
  return(
    <div className="tac-ovr">
      <div className="tac-wrap">
        <div className="tac-h">
          <Ic.Tactic style={{width:15,height:15,color:'var(--acc)'}}/>
          <span style={{fontFamily:'var(--fd)',fontWeight:600,fontSize:14}}>Tablero Táctico</span>
          <button onClick={onClose} style={{marginLeft:'auto',width:24,height:24,borderRadius:'50%',background:'var(--card3)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--tx2)'}}><Ic.X style={{width:12,height:12}}/></button>
        </div>
        <canvas ref={cRef} style={{display:'block',width:'100%',cursor:'crosshair',flex:1}}
          onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
          onTouchStart={e=>{e.preventDefault();onDown(e)}} onTouchMove={e=>{e.preventDefault();onMove(e)}} onTouchEnd={onUp}/>
        <div className="tac-tools">
          {TOOLS.map(t=><button key={t.id} className={`tool-btn${tool===t.id?' on':''}`} onClick={()=>setTool(t.id)}>{t.l}</button>)}
          <div style={{display:'flex',gap:4}}>{COLORS.map(c=><div key={c} onClick={()=>setColor(c)} style={{width:17,height:17,borderRadius:'50%',background:c,cursor:'pointer',border:`2px solid ${color===c?'#fff':'transparent'}`,transition:'.1s'}}/> )}</div>
          <div style={{marginLeft:'auto',display:'flex',gap:5}}>
            <button className="tool-btn" onClick={()=>setPaths(p=>p.slice(0,-1))}><Ic.Undo style={{width:12,height:12}}/></button>
            <button className="tool-btn" onClick={()=>setPaths([])}><Ic.Eraser style={{width:12,height:12}}/></button>
            <button className="btn btn-r btn-sm" onClick={()=>{const url=cRef.current.toDataURL('image/png');if(onSave)onSave(url);}}>
              <Ic.Down style={{width:12,height:12}}/>Compartir
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

    {id:1,user:'ScrumMaster',av:'SM',color:'#16A34A',text:'Totalmente de acuerdo. El VAR debería tener un árbitro neutral.',likes:18,t:'Hace 45m',level:'Ultra Fan'},

  ]);
  const[liked,setLiked]=useState({});
  const[showTactic,setShowTactic]=useState(false);
  const[tacImg,setTacImg]=useState(null);
  function addComment(){
    if(!comment.trim())return;
    setComments(c=>[{id:Date.now(),user:user.name||'Vos',av:user.av||'?',color:user.color||'#888',text:comment,likes:0,t:'Ahora',level:getLevel(rep).name},...c]);

];

function App(){
  const[page,setPage]=useState('home');
  const[article,setArticle]=useState(null);
  const[theme,setTheme]=useState('dark');
  const[themeOpen,setThemeOpen]=useState(false);
  const[toasts,setToasts]=useState([]);
  const[authOpen,setAuthOpen]=useState(false);
  const[user,setUser]=useState({name:'Invitado',av:'?',color:'#888',rep:0,isGuest:true});

  function addToast({msg,em='✓'}){
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,em}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  }
  function nav(p){setPage(p);setArticle(null);window.scrollTo(0,0);}
  function openNews(n){setArticle(n);setPage('article');window.scrollTo(0,0);}
  function changeTheme(t){
    setTheme(t);setThemeOpen(false);
    document.documentElement.setAttribute('data-theme',t);
  }

  const THEMES=[{id:'dark',l:'🌙 Oscuro'},{id:'light',l:'☀️ Claro'},{id:'pastel',l:'🎨 Pastel'},{id:'night',l:'🌑 Noche'}];
  const curTheme=THEMES.find(t=>t.id===theme)||THEMES[0];

  return(
    <>
      <Toast toasts={toasts}/>

      {/* TOPBAR */}
      <div className="tb">
        <div className="logo" onClick={()=>nav('home')}>
          <span className="lr">TRIBUNA</span><div className="lbar"/><span className="lw">LIBRE</span>
        </div>
        <div className="ticker">
          <div className="tk-tr">
            {[...TICKER,...TICKER].map((t,i)=><div key={i} className="tk-it"><b>{t.l}</b>{t.t}</div>)}
          </div>
        </div>
        <div className="tb-r">
          {/* Theme */}
          <div style={{position:'relative'}}>
            <button className="th-pick" onClick={()=>setThemeOpen(!themeOpen)}>{curTheme.l}</button>
            {themeOpen&&(
              <div className="th-drop" onClick={e=>e.stopPropagation()}>
                {THEMES.map(t=><div key={t.id} className={`th-opt${theme===t.id?' on':''}`} onClick={()=>changeTheme(t.id)}>{t.l}</div>)}
              </div>
            )}
          </div>
          <button className="ib" onClick={()=>addToast({msg:'Sin notificaciones nuevas',em:'🔔'})}><Ic.Bell/><div className="ndot"/></button>
          {user.isGuest?(
            <button className="btn btn-r btn-sm" style={{padding:'4px 10px',fontSize:11}} onClick={()=>setAuthOpen(true)}>Ingresar</button>
          ):(
            <div className="av-sm" onClick={()=>nav('profile')} style={{background:user.color}}>{user.av}</div>
          )}
        </div>
      </div>

      <div className="shell" onClick={()=>setThemeOpen(false)}>
        {/* LEFT SIDEBAR */}
        <aside className="lsb">
          <div className="lv-pill" onClick={()=>nav('live')}>
            <div className="ldot"/><span className="lv-txt">EN VIVO</span><span className="lv-ct">3</span>
          </div>
          <div className="ng">
            <div className="nlbl">Navegación</div>
            {NAV.map(n=>{const Icon=Ic[n.icon];return(
              <div key={n.id} className={`nl${page===n.id||page==='article'&&n.id==='news'?' on':''}`} onClick={()=>nav(n.id)}>
                <Icon/><span>{n.l}</span>
                {n.id==='community'&&<span className="nl-badge">5</span>}
                {n.id==='live'&&<span className="nl-badge">3</span>}
              </div>
            );})}
          </div>
          <div className="lsb-hr"/>
          <div className="ng">
            <div className="nlbl">Mis equipos</div>
            {[{em:'🔴',n:'River Plate',s:'ARS'},{em:'🔵',n:'Boca Juniors',s:'ARS'},{em:'⚡',n:'Racing Club',s:'ARS'},{em:'🟡',n:'Peñarol',s:'URU'}].map((t,i)=>(
              <div key={i} className="tm-row"><span className="tm-em">{t.em}</span><div className="tm-nm">{t.n}<small>{t.s}</small></div></div>
            ))}
          </div>
          {!user.isGuest&&(
            <>
              <div className="lsb-hr"/>
              <div className="ng">
                <div className="nlbl">Mi cuenta</div>
                <div className="nl" style={{padding:'5px 7px'}}>
                  <div style={{width:20,height:20,borderRadius:'50%',background:user.color,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:9,color:'#fff',flexShrink:0}}>{user.av}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div>
                    <div style={{fontSize:9,color:'var(--gold)'}}>{getLevel(user.rep||0).name}</div>
                  </div>
                </div>
              </div>
            </>
          )}
        </aside>

        {/* MAIN */}
        <main className="main">
          <div style={{maxWidth:760,margin:'0 auto'}}>
            {page==='home'&&<HomePage onNews={openNews} onNav={nav} user={user}/>}
            {page==='news'&&(
              <div>
                <div className="sh"><div className="st">Noticias</div></div>
                <div className="ng-grid">{NEWS.map(n=><NewsCard key={n.id} n={n} onClick={()=>openNews(n)} size="big"/>)}</div>
              </div>
            )}
            {page==='article'&&article&&(
              <div>
                <button onClick={()=>nav('news')} style={{display:'flex',alignItems:'center',gap:5,background:'none',color:'var(--tx2)',marginBottom:13,fontSize:12}}><Ic.Back style={{width:13,height:13}}/>Volver</button>
                <div style={{height:240,background:'var(--card2)',borderRadius:'var(--rl)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:72,marginBottom:12,border:'1px solid var(--br)'}}>{article.em}</div>
                <div style={{display:'flex',gap:6,marginBottom:9,flexWrap:'wrap'}}>
                  <span className="badge br-b">{article.cat}</span>
                  {article.ai&&<span className="badge bv-b">✦ Resumen IA</span>}
                </div>
                <h1 style={{fontFamily:'var(--fd)',fontSize:26,fontWeight:700,lineHeight:1.1,marginBottom:9}}>{article.title}</h1>
                <div style={{fontSize:12,color:'var(--tx2)',marginBottom:16}}>{article.auth} · {article.t} · ❤ {article.l} · 💬 {article.c}</div>
                <p style={{fontSize:14,lineHeight:1.75,color:'var(--tx2)',marginBottom:16}}>{article.ex} Lorem ipsum dolor sit amet, consectetur adipiscing elit. El partido fue un espectáculo con momentos históricos que quedarán en la memoria colectiva del deporte argentino.</p>
                <div className="card cp"><Poll poll={POLLS[0]}/></div>
              </div>
            )}
            {page==='community'&&<CommunityPage user={user} addToast={addToast}/>}
            {page==='live'&&<LivePage/>}
            {page==='stream'&&(
              <div>
                <div className="sh"><div className="st">Streaming</div></div>
                <div style={{display:'grid',gap:11,gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))'}}>
                  {['River vs Racing ⚽','Los Pumas Analysis 🏉','F1 Mónaco 🏎️','NBA Playoffs 🏀','Wimbledon 🎾','Copa Argentina ⚽'].map((s,i)=>(
                    <div key={i} className="nc">
                      <div className="nt big" style={{position:'relative'}}>
                        <span style={{fontSize:40}}>{s.slice(-2)}</span>
                        {i<4&&<div style={{position:'absolute',top:8,left:8,background:'var(--acc)',color:'#fff',fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:20,display:'flex',alignItems:'center',gap:3}}><div style={{width:5,height:5,borderRadius:'50%',background:'#fff',animation:'pulse 1.4s infinite'}}/>LIVE</div>}
                      </div>
                      <div className="nb">
                        <div className="ntit">{s.slice(0,-2)}</div>
                        <div style={{fontSize:11,color:'var(--tx3)'}}>{(12000+i*3000).toLocaleString()} viendo</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {page==='var'&&(
              <div>
                <div className="sh"><div className="st">El VAR</div><span className="badge bv-b">IA</span></div>
                <p style={{fontSize:12,color:'var(--tx2)',marginBottom:13,lineHeight:1.5}}>Votá las jugadas polémicas detectadas por nuestra IA en tiempo real.</p>
                {POLLS.map(p=>(
                  <div key={p.id} className="card cp" style={{marginBottom:12}}>
                    <div style={{marginBottom:8,display:'flex',gap:6,flexWrap:'wrap'}}>
                      <span className="badge br-b">🎥 VAR</span>
                      <span className="badge bv-b">✦ IA detectó esta jugada</span>
                    </div>
                    <Poll poll={p}/>
                  </div>
                ))}
              </div>
            )}
            {page==='profile'&&(
              <div>
                <div className="ph">
                  <div className="pav" style={{background:user.isGuest?'#888':user.color}}>{user.isGuest?'?':user.av}</div>
                  <div className="pnm">{user.isGuest?'Invitado':user.name}</div>
                  <div className="pbio">{user.isGuest?'Registrate para personalizar tu perfil':'Fanático del deporte argentino 🇦🇷'}</div>
                  {user.isGuest?(
                    <button className="btn btn-r btn-sm" onClick={()=>setAuthOpen(true)}>Crear cuenta gratis</button>
                  ):(
                    <div style={{display:'flex',gap:6,justifyContent:'center',flexWrap:'wrap',marginBottom:12}}>
                      <span className="badge bp-b">⭐ Verificado</span>
                      <span className="badge bg-b">{getLevel(user.rep||0).name}</span>
                    </div>
                  )}
                  {!user.isGuest&&(
                    <div className="psts">
                      {[{n:'234',l:'Posts'},{n:'1.8k',l:'Seguidores'},{n:user.rep||0,l:'Reputación'},{n:'48',l:'Hilos'}].map((s,i)=>(
                        <div key={i}><div className="psn" style={{color:i===0?'var(--acc)':i===2?'var(--gold)':'var(--tx)'}}>{s.n}</div><div className="psl">{s.l}</div></div>
                      ))}
                    </div>
                  )}
                </div>
                {!user.isGuest&&(
                  <div className="rep-card">
                    <div className="rep-h"><div className="rep-tit"><Ic.Trophy style={{width:12,height:12,color:'var(--gold)'}}/>Tribuna Activa</div><div className="rep-sc">{user.rep||0} pts</div></div>
                    <div className="rep-bg"><div className="rep-fill" style={{width:getRepPct(user.rep||0)+'%'}}/></div>
                    <div className="rep-lv"><span>{getLevel(user.rep||0).name}</span><span>Próx: {getLevel(user.rep||0).max} pts</span></div>
                  </div>
                )}
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-g" style={{flex:1,justifyContent:'center'}}>Editar perfil</button>
                  <button className="btn btn-r" style={{flex:1,justifyContent:'center'}} onClick={()=>nav('admin')}>Admin</button>
                </div>
              </div>
            )}
            {page==='admin'&&<AdminPage addToast={addToast}/>}
          </div>
        </main>

        {/* RIGHT SIDEBAR */}
        <aside className="rsb"><RightSidebar onNav={nav}/></aside>
      </div>

      {/* MOBILE BOTTOM NAV */}
      <div className="bnav">
        {MOBILE_NAV.map(n=>{const Icon=Ic[n.icon];return(
          <div key={n.id} className={`bni${page===n.id?' on':''}`} onClick={()=>nav(n.id)}>
            <Icon/><span>{n.l}</span>
          </div>
        );})}
      </div>

      {/* AUTH MODAL */}
      {authOpen&&<AuthModal onClose={()=>setAuthOpen(false)} onLogin={setUser} addToast={addToast}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
