window.__fbReady         = false;

window.__fbRegister      = window.__fbSignIn;
window.__fbGoogleSignIn  = window.__fbSignIn;
window.__fbSignOut       = function(){ return Promise.resolve(); };
window.__fbOnAuthChange  = function(){};

function __initFirebase() {
  try {
    var firebaseConfig = {
      apiKey:            "AIzaSyBSGW1Fw2ZwAz8GEXmhGu9nqt8hiCgzkd8",
      authDomain:        "tribunalibre.firebaseapp.com",
      projectId:         "tribunalibre",
      storageBucket:     "tribunalibre.firebasestorage.app",
      messagingSenderId: "502168463964",
      appId:             "1:502168463964:web:47ccf03ee592035bcd5499",
      measurementId:     "G-CWK2L4HDR2"
    };
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();
    var gp   = new firebase.auth.GoogleAuthProvider();
    window.__fbAuth          = auth;
    window.__fbReady         = true;
    window.__fbSignIn        = function(e,p){ return auth.signInWithEmailAndPassword(e,p); };
    window.__fbRegister      = function(e,p){ return auth.createUserWithEmailAndPassword(e,p); };
    window.__fbSignOut       = function(){    return auth.signOut(); };
    window.__fbGoogleSignIn  = function(){    return auth.signInWithPopup(gp); };
    window.__fbOnAuthChange  = function(cb){  return auth.onAuthStateChanged(cb); };
    console.log('Firebase listo ✓');
  } catch(e) {
    console.warn('Firebase error (no critico):', e.message);
  }
}

// Carga firebase-app primero, luego firebase-auth, luego init
(function() {
  var s1 = document.createElement('script');
  s1.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  s1.onload = function() {
    var s2 = document.createElement('script');
    s2.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js';
    s2.onload = function() {
      __initFirebase();
    };
    s2.onerror = function() { console.warn('No se pudo cargar firebase-auth'); };
    document.head.appendChild(s2);
  };
  s1.onerror = function() { console.warn('No se pudo cargar firebase-app'); };
  document.head.appendChild(s1);
})();
</script>

<style>
/* ══════════════════════════════════════════
   TOKENS — CELESTE Y BLANCO ARGENTINA
══════════════════════════════════════════ */
:root{
  --cel:#4A90D9;--cel-d:#2E6FB5;--cel-l:#74ACDF;
  --cel-xl:#E8F4FF;--cel-bg:#F0F7FF;
  --bg:#F0F7FF;--white:#FFFFFF;
  --red:#C0392B;--sun:#F6B40E;--green:#27AE60;
  --purple:#8B5CF6;--pink:#EC4899;
  --tx:#1A2744;--tx2:#4A5568;--tx3:#9FAEC0;
  --br:rgba(74,144,217,.18);--brm:rgba(74,144,217,.32);
  --sh:0 4px 20px rgba(74,144,217,.14);
  --sh2:0 8px 36px rgba(74,144,217,.22);
  --r:11px;--rs:7px;--rl:17px;
  --fd:'Oswald',sans-serif;--fw:'DM Sans',sans-serif;
  --fs:'Merriweather',serif;--h:60px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:var(--fw);min-height:100vh;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:var(--fd)}
button{cursor:pointer;border:none;outline:none;font-family:var(--fw)}
input,textarea,select{outline:none;font-family:var(--fw);color:var(--tx)}
img{max-width:100%;height:auto;display:block}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--cel-l);border-radius:3px}
::selection{background:var(--cel);color:#fff}

/* FLAG STRIPE */
.flag-stripe{height:5px;background:linear-gradient(90deg,var(--cel) 33%,var(--white) 33%,var(--white) 66%,var(--cel) 66%);position:fixed;top:0;left:0;right:0;z-index:400}

/* TOPBAR */
.hdr{position:fixed;top:5px;left:0;right:0;height:var(--h);background:var(--white);border-bottom:2px solid var(--cel);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:300;box-shadow:var(--sh)}
.logo-w{display:flex;align-items:center;gap:9px;cursor:pointer;flex-shrink:0;user-select:none}
.logo-img{height:42px;width:42px;border-radius:50%;border:2px solid var(--cel);object-fit:cover;background:var(--cel-xl);flex-shrink:0}
.logo-fb{height:42px;width:42px;border-radius:50%;border:2px solid var(--cel);background:var(--cel);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:16px;font-weight:700;color:white;flex-shrink:0;letter-spacing:1px}
.logo-txt{display:flex;flex-direction:column;line-height:1.1}
.logo-main{font-family:var(--fd);font-size:19px;font-weight:700;color:var(--cel-d);letter-spacing:1px}
.logo-sub{font-size:10px;color:var(--tx3);letter-spacing:.4px}
.logo-sub b{color:var(--cel)}
.ticker{flex:1;overflow:hidden;border-left:3px solid var(--cel);padding-left:8px;min-width:0;display:none}
@media(min-width:600px){.ticker{display:block}}
.tk-tr{display:flex;gap:28px;animation:tick 32s linear infinite;white-space:nowrap}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tk-it{font-size:11px;color:var(--tx2);flex-shrink:0}
.tk-it b{color:var(--cel-d);font-size:9px;background:var(--cel-xl);padding:1px 5px;border-radius:3px;margin-right:4px}
.hdr-r{display:flex;align-items:center;gap:7px;flex-shrink:0}
.sign-btn{padding:6px 14px;border-radius:30px;background:var(--cel);color:white;font-size:12px;font-weight:600;border:2px solid var(--cel);transition:.15s}
.sign-btn:hover{background:var(--cel-d)}
.usr-btn{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 4px;border-radius:30px;background:var(--cel-xl);border:1.5px solid var(--cel);cursor:pointer;transition:.15s}
.usr-btn:hover{background:var(--cel)}
.usr-av{width:26px;height:26px;border-radius:50%;background:var(--cel);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:white;font-family:var(--fd);flex-shrink:0}
.usr-nm{font-size:11px;font-weight:600;color:var(--cel-d)}
.usr-btn:hover .usr-nm{color:white}

/* SHELL */
.shell{display:flex;margin-top:calc(var(--h)+5px);min-height:calc(100vh - var(--h) - 5px)}
.lnav{width:200px;flex-shrink:0;position:sticky;top:calc(var(--h)+5px);height:calc(100vh - var(--h) - 5px);overflow-y:auto;scrollbar-width:none;background:var(--white);border-right:1px solid var(--br);padding:10px 0;display:none;flex-direction:column}
@media(min-width:860px){.lnav{display:flex}}
.ng{padding:0 8px;margin-bottom:5px}
.nlbl{font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:1.8px;text-transform:uppercase;padding:0 6px;margin-bottom:3px;display:block}
.nl{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:var(--rs);cursor:pointer;color:var(--tx2);font-size:12.5px;font-weight:500;transition:.15s;margin-bottom:1px}
.nl:hover{background:var(--cel-xl);color:var(--cel-d)}
.nl.on{background:var(--cel);color:white}
.nl svg{width:14px;height:14px;flex-shrink:0}
.nl-badge{margin-left:auto;background:var(--red);color:white;font-size:9px;border-radius:10px;padding:1px 5px;font-weight:700}
.nav-hr{height:1px;background:var(--br);margin:6px 10px}
.nl-live{display:flex;align-items:center;gap:6px;margin:4px 8px 7px;padding:7px 9px;background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);border-radius:var(--rs);cursor:pointer;transition:.15s}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.5)}}
.nl-live-t{font-size:11px;font-weight:700;color:var(--red);font-family:var(--fd);letter-spacing:.5px}
.nl-live-c{font-size:10px;color:rgba(192,57,43,.5);margin-left:auto}
.main{flex:1;min-width:0;padding:18px 14px}
@media(min-width:860px){.main{padding:22px 20px}}
.rsb{width:285px;flex-shrink:0;position:sticky;top:calc(var(--h)+5px);height:calc(100vh - var(--h) - 5px);overflow-y:auto;padding:16px 13px;border-left:1px solid var(--br);background:var(--white);display:none;scrollbar-width:none}
@media(min-width:1200px){.rsb{display:block}}
.bnav{position:fixed;bottom:0;left:0;right:0;height:54px;background:var(--white);border-top:2px solid var(--cel);display:flex;align-items:center;z-index:300}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;cursor:pointer;color:var(--tx3);transition:.15s}
.bni.on{color:var(--cel-d)}
.bni svg{width:17px;height:17px}
.bni span{font-size:9px;font-weight:600;font-family:var(--fd);letter-spacing:.3px}
@media(min-width:860px){.bnav{display:none}}
@media(max-width:859px){body{padding-bottom:54px}}

/* ATOMS */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--br)}
.cp{padding:15px}.cs{padding:11px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.st{font-family:var(--fd);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;display:flex;align-items:center;gap:7px;color:var(--tx)}
.st::before{content:'';width:3px;height:13px;background:var(--cel);border-radius:2px;display:inline-block}
.sl{font-size:11px;color:var(--cel);cursor:pointer;font-weight:600}
.sl:hover{color:var(--cel-d);text-decoration:underline}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;font-family:var(--fd);letter-spacing:.8px;text-transform:uppercase}
.bc{background:var(--cel-xl);color:var(--cel-d);border:1px solid var(--br)}
.br-b{background:rgba(192,57,43,.1);color:#B03020;border:1px solid rgba(192,57,43,.2)}
.bg-b{background:rgba(39,174,96,.12);color:#1E8449;border:1px solid rgba(39,174,96,.25)}
.bv-b{background:rgba(139,92,246,.1);color:#6D28D9;border:1px solid rgba(139,92,246,.2)}
.bs{background:rgba(246,180,14,.12);color:#B7770D;border:1px solid rgba(246,180,14,.25)}
.bp{background:rgba(236,72,153,.12);color:#9D174D;border:1px solid rgba(236,72,153,.25)}
.btn{padding:7px 16px;border-radius:30px;font-size:12px;font-weight:600;transition:.15s;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-c{background:var(--cel);color:white;border:2px solid var(--cel)}
.btn-c:hover{background:var(--cel-d);box-shadow:var(--sh)}
.btn-o{background:transparent;border:2px solid var(--cel);color:var(--cel-d)}
.btn-o:hover{background:var(--cel-xl)}
.btn-red{background:var(--red);color:white;border:2px solid var(--red)}
.btn-g{background:var(--green);color:white;border:2px solid var(--green)}
.btn-p{background:var(--purple);color:white;border:2px solid var(--purple)}
.btn-pk{background:var(--pink);color:white;border:2px solid var(--pink)}
.btn-s{background:var(--sun);color:white;border:2px solid var(--sun)}
.btn-sm{padding:5px 11px;font-size:11px}
.fi{width:100%;background:var(--cel-xl);border:1.5px solid var(--br);border-radius:var(--rs);padding:9px 12px;font-size:13px;color:var(--tx);transition:.15s}
.fi:focus{border-color:var(--cel);box-shadow:0 0 0 3px rgba(74,144,217,.1)}
.fi::placeholder{color:var(--tx3)}
.fl{display:block;font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.divhr{height:1px;background:var(--br);margin:12px 0}
.toasts{position:fixed;top:calc(var(--h)+12px);right:13px;z-index:600;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--white);border:1.5px solid var(--br);border-radius:var(--r);padding:9px 13px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px;box-shadow:var(--sh2);animation:tin .3s;min-width:190px;pointer-events:all}
.toast.ok{border-color:rgba(39,174,96,.5)}.toast.err{border-color:rgba(192,57,43,.5)}
@keyframes tin{from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1}}
.mbg{position:fixed;inset:0;background:rgba(26,39,68,.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px)}
.mdl{background:var(--white);border-radius:var(--rl);border:2px solid var(--cel);padding:22px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto;box-shadow:var(--sh2)}
.mdl-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mdl-t{font-family:var(--fd);font-size:19px;font-weight:600}
.cls{width:26px;height:26px;border-radius:50%;background:var(--cel-xl);display:flex;align-items:center;justify-content:center;color:var(--cel-d);cursor:pointer;border:none}
.cls:hover{background:var(--cel);color:white}
.cls svg{width:13px;height:13px}
.err-msg{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);border-radius:var(--rs);padding:8px 12px;font-size:12px;color:#B03020;margin-bottom:12px}

/* NEWS CARDS */
.nc{background:var(--white);border-radius:var(--r);border:1px solid var(--br);overflow:hidden;cursor:pointer;transition:.18s;display:flex;flex-direction:column}
.nc:hover{border-color:var(--cel);transform:translateY(-2px);box-shadow:var(--sh2)}
.nc-img{overflow:hidden;position:relative;background:var(--cel-xl)}
.nc-img.big{height:170px}.nc-img.sm{height:120px}.nc-img.xs{height:90px}
.nc-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.nc:hover .nc-img img{transform:scale(1.04)}
.nc-em{display:flex;align-items:center;justify-content:center;font-size:48px;width:100%;height:100%}
.nc-cat{position:absolute;top:8px;left:8px}
.nc-body{padding:12px;flex:1;display:flex;flex-direction:column}
.nc-tit{font-family:var(--fd);font-size:14px;font-weight:500;line-height:1.25;margin-bottom:5px;color:var(--tx)}
.nc-exc{font-size:11px;color:var(--tx2);line-height:1.55;margin-bottom:8px;flex:1}
.nc-ft{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--tx3);padding-top:8px;border-top:1px solid var(--br);margin-top:auto}
.nc-ac{display:flex;gap:8px}
.abt{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--tx2);background:none;transition:.15s;padding:0}
.abt:hover,.abt.lk{color:var(--cel-d)}
.abt svg{width:11px;height:11px}
.ng-grid{display:grid;gap:12px;grid-template-columns:1fr}
@media(min-width:540px){.ng-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1400px){.ng-grid{grid-template-columns:1fr 1fr 1fr}}

/* SKELETON */
.sk{background:linear-gradient(90deg,var(--cel-xl) 25%,rgba(74,144,217,.1) 50%,var(--cel-xl) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--rs)}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

/* LIVE */
.lstrip{display:flex;gap:9px;overflow-x:auto;margin-bottom:18px;padding-bottom:3px;scrollbar-width:none}
.lmc{background:var(--white);border:1.5px solid var(--br);border-radius:var(--r);padding:10px 13px;cursor:pointer;flex-shrink:0;min-width:160px;transition:.15s}
.lmc:hover,.lmc.sel{border-color:var(--cel);box-shadow:var(--sh)}
.lmc.lv{border-color:rgba(192,57,43,.3);background:rgba(192,57,43,.04)}
.lms{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--tx3);margin-bottom:7px}
.lms.lv{color:var(--red)}
.lmt{display:flex;align-items:center;justify-content:space-between;gap:7px}
.ltm{text-align:center;flex:1}
.lem{font-size:20px;display:block;margin-bottom:2px}
.lnm{font-size:10px;color:var(--tx2);font-weight:500}
.lsc{font-family:var(--fd);font-size:24px;font-weight:700;color:var(--tx);min-width:42px;text-align:center}
.lsc.lv{color:var(--red)}

/* POLL */
.poll-q{font-family:var(--fd);font-size:14px;font-weight:500;margin-bottom:10px;color:var(--tx);line-height:1.3}
.po{background:var(--cel-xl);border-radius:var(--rs);padding:9px 12px;margin-bottom:6px;cursor:pointer;border:1.5px solid var(--br);position:relative;overflow:hidden;transition:.15s}
.po:hover{border-color:var(--cel)}
.po.voted{border-color:var(--cel-d)}
.po-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(74,144,217,.2);transition:width .7s}
.po.voted .po-bar{background:rgba(74,144,217,.25)}
.po-row{position:relative;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:500;color:var(--tx)}
.po-pct{font-weight:700;font-size:11px;color:var(--tx3)}
.po-pct.win{color:var(--cel-d)}
.po-meta{font-size:10px;color:var(--tx3);margin-top:6px}

/* TRENDING */
.tri{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--br);cursor:pointer}
.tri:last-child{border-bottom:none}
.trnum{font-family:var(--fd);font-size:16px;font-weight:700;color:var(--tx3);width:20px;flex-shrink:0}
.trnum.hot{color:var(--cel)}
.trn{font-size:12px;font-weight:500;color:var(--tx)}
.trc{font-size:10px;color:var(--tx3);margin-top:1px}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--cel-xl);border-radius:var(--r);padding:3px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.tabx{flex-shrink:0;padding:6px 12px;text-align:center;border-radius:var(--rs);font-size:11px;font-weight:700;font-family:var(--fd);cursor:pointer;color:var(--tx2);transition:.15s;white-space:nowrap}
.tabx.on{background:var(--cel);color:white}

/* AUTH */
.auth-tabs{display:flex;background:var(--cel-xl);border-radius:var(--r);padding:3px;margin-bottom:16px}
.atab{flex:1;padding:7px;text-align:center;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;color:var(--tx2);transition:.15s;font-family:var(--fd)}
.atab.on{background:var(--cel);color:white}
.soc-btn{width:100%;padding:10px;border-radius:var(--rs);border:1.5px solid var(--br);background:var(--cel-xl);color:var(--tx);display:flex;align-items:center;justify-content:center;gap:9px;font-size:13px;font-weight:500;margin-bottom:8px;transition:.15s;cursor:pointer}
.soc-btn:hover{border-color:var(--cel)}
.or-div{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--tx3);font-size:11px}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--br)}

/* PRODE */
.prode-match{background:var(--white);border:1.5px solid var(--br);border-radius:var(--r);padding:13px;margin-bottom:10px;transition:.15s}
.prode-match:hover{border-color:var(--cel);box-shadow:var(--sh)}
.prode-match.locked{background:var(--cel-xl);border-color:var(--br)}
.prode-teams{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.prode-team{flex:1;text-align:center}
.prode-em{font-size:26px;display:block;margin-bottom:3px}
.prode-nm{font-size:12px;font-weight:600;color:var(--tx)}
.prode-vs{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--tx3);flex-shrink:0}
.prode-pickers{display:flex;gap:6px}
.prode-btn{flex:1;padding:8px 4px;border-radius:var(--rs);font-size:11px;font-weight:700;font-family:var(--fd);cursor:pointer;border:1.5px solid var(--br);background:var(--white);color:var(--tx2);transition:.15s;text-align:center}
.prode-btn:hover{border-color:var(--cel);background:var(--cel-xl);color:var(--cel-d)}
.prode-btn.sel-h{background:var(--cel);border-color:var(--cel);color:white}
.prode-btn.sel-e{background:var(--sun);border-color:var(--sun);color:white}
.prode-btn.sel-a{background:var(--red);border-color:var(--red);color:white}
.prode-btn.correct{background:var(--green);border-color:var(--green);color:white}
.prode-btn.wrong{background:rgba(192,57,43,.15);border-color:var(--red);color:var(--red)}

/* REVISTA */
.rev-article{background:var(--white);border-radius:var(--r);border:1px solid var(--br);overflow:hidden;cursor:pointer;transition:.2s;display:flex;flex-direction:column}
.rev-article:hover{border-color:var(--pink);transform:translateY(-2px);box-shadow:0 8px 30px rgba(236,72,153,.15)}
.rev-img{height:140px;background:linear-gradient(135deg,#FDF2F8,#FCE7F3);display:flex;align-items:center;justify-content:center;font-size:52px;position:relative}
.rev-body{padding:13px;flex:1;display:flex;flex-direction:column}
.rev-tit{font-family:var(--fd);font-size:14px;font-weight:600;line-height:1.25;margin-bottom:5px;color:var(--tx)}
.rev-exc{font-size:11px;color:var(--tx2);line-height:1.55;flex:1;margin-bottom:9px}
.rev-ft{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--tx3);flex-wrap:wrap}
.rev-author{display:flex;align-items:center;gap:5px}
.rev-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:9px;color:white;font-family:var(--fd)}

/* FIXTURE */
.fix-round{background:var(--cel);color:white;border-radius:var(--r);padding:8px 14px;margin-bottom:10px;font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between}
.fix-match{background:var(--white);border:1px solid var(--br);border-radius:var(--rs);padding:10px 13px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;transition:.15s}
.fix-match:hover{border-color:var(--cel);background:var(--cel-xl)}
.fix-team{display:flex;align-items:center;gap:6px;flex:1}
.fix-team.right{flex-direction:row-reverse}
.fix-em{font-size:18px}
.fix-nm{font-size:12px;font-weight:600;color:var(--tx)}
.fix-score{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--tx);min-width:50px;text-align:center}
.fix-score.live{color:var(--red)}
.fix-date{font-size:10px;color:var(--tx3);min-width:50px;text-align:center}
.group-hd{background:linear-gradient(135deg,var(--cel-d),var(--cel));color:white;border-radius:var(--rs);padding:7px 12px;margin-bottom:7px;font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:.5px}
.group-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px}
.group-table th{background:var(--cel-xl);padding:6px 8px;text-align:left;font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase}
.group-table td{padding:7px 8px;border-bottom:1px solid var(--br)}
.group-table tr:last-child td{border-bottom:none}
.group-table tr:hover td{background:var(--cel-xl)}

/* HERO */
.hero{position:relative;border-radius:var(--rl);overflow:hidden;cursor:pointer;margin-bottom:20px;border:2px solid var(--cel);box-shadow:var(--sh);transition:.2s}
.hero:hover{box-shadow:var(--sh2)}
.hero-bg{height:340px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--cel-xl),#D6EAF8);overflow:hidden}
@media(min-width:900px){.hero-bg{height:400px}}
.hero-bg img{width:100%;height:100%;object-fit:cover}
.hero-ov{position:absolute;bottom:0;left:0;right:0;padding:18px;background:linear-gradient(transparent,rgba(26,39,68,.96))}
.hero-tit{font-family:var(--fd);font-size:24px;font-weight:700;line-height:1.1;color:white;margin-bottom:7px}
@media(min-width:900px){.hero-tit{font-size:32px}}

  }, []);
  return {
    toasts,
    add
  };
}

/* ══════ USE NEWS (API + fallback) ══════ */
function useNews(page = 1, cat = '', search = '') {
  const [state, setState] = useState({
    posts: [],
    total: 0,
    pages: 1,
    loading: true,
    error: null,
    fromApi: false
  });
  useEffect(() => {
    setState(s => ({
      ...s,
      loading: true,
      error: null
    }));
    const params = new URLSearchParams({
      page,
      limit: 18
    });
    if (cat) params.set('category', cat);
    if (search) params.set('search', search);
    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 6000);
    fetch(`${API}/api/news?${params}`, {
      signal: ctrl.signal
    }).then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }).then(d => {
      clearTimeout(timeout);
      setState({
        posts: d.posts || [],
        total: d.pagination?.total || 0,
        pages: d.pagination?.pages || 1,
        loading: false,
        error: null,
        fromApi: true
      });
    }).catch(e => {
      clearTimeout(timeout);
      if (e.name === 'AbortError' || e.message.includes('fetch') || e.message.includes('Failed') || e.message.includes('NetworkError')) {
        // Sin backend: usar datos estáticos silenciosamente
        const filtered = cat ? STATIC_NEWS.filter(n => n.cat === cat) : STATIC_NEWS;
        setState({
          posts: filtered,
          total: filtered.length,
          pages: 1,
          loading: false,
          error: null,
          fromApi: false
        });
      } else {
        setState(s => ({
          ...s,
          loading: false,
          error: e.message,
          fromApi: false
        }));
      }
    });
    return () => clearTimeout(timeout);
  }, [page, cat, search]);
  return state;
}
