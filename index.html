<style>
:root{
  --cel:#4A90D9;--cel-d:#2E6FB5;--cel-l:#74ACDF;
  --cel-xl:#E8F4FF;--bg:#F0F7FF;--white:#FFFFFF;
  --red:#C0392B;--sun:#F6B40E;--green:#27AE60;
  --purple:#8B5CF6;--pink:#EC4899;--teal:#0891B2;
  --tx:#1A2744;--tx2:#4A5568;--tx3:#9FAEC0;
  --br:rgba(74,144,217,.18);--brm:rgba(74,144,217,.32);
  --sh:0 4px 20px rgba(74,144,217,.14);
  --sh2:0 8px 36px rgba(74,144,217,.22);
  --r:11px;--rs:7px;--rl:17px;
  --fd:'Oswald',sans-serif;--fw:'DM Sans',sans-serif;
  --h:60px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:var(--fw);min-height:100vh;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:var(--fd)}
button{cursor:pointer;border:none;outline:none;font-family:var(--fw)}
input,textarea,select{outline:none;font-family:var(--fw);color:var(--tx)}
img{max-width:100%;height:auto;display:block}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--cel-l);border-radius:3px}
::selection{background:var(--cel);color:#fff}

/* LAYOUT */
.flag-stripe{height:5px;background:linear-gradient(90deg,var(--cel) 33%,var(--white) 33%,var(--white) 66%,var(--cel) 66%);position:fixed;top:0;left:0;right:0;z-index:400}
.hdr{position:fixed;top:5px;left:0;right:0;height:var(--h);background:var(--white);border-bottom:2px solid var(--cel);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:300;box-shadow:var(--sh)}
.logo-w{display:flex;align-items:center;gap:9px;cursor:pointer;flex-shrink:0;user-select:none}
.logo-img{height:42px;width:42px;border-radius:50%;border:2px solid var(--cel);object-fit:cover;background:var(--cel-xl);flex-shrink:0}
.logo-fb{height:42px;width:42px;border-radius:50%;border:2px solid var(--cel);background:var(--cel);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:16px;font-weight:700;color:white;flex-shrink:0}
.logo-txt{display:flex;flex-direction:column;line-height:1.1}
.logo-main{font-family:var(--fd);font-size:19px;font-weight:700;color:var(--cel-d);letter-spacing:1px}
.logo-sub{font-size:10px;color:var(--tx3)}
.logo-sub b{color:var(--cel)}
.ticker{flex:1;overflow:hidden;border-left:3px solid var(--cel);padding-left:8px;min-width:0;display:none}
@media(min-width:600px){.ticker{display:block}}
.tk-tr{display:flex;gap:28px;animation:tick 32s linear infinite;white-space:nowrap}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tk-it{font-size:11px;color:var(--tx2);flex-shrink:0}
.tk-it b{color:var(--cel-d);font-size:9px;background:var(--cel-xl);padding:1px 5px;border-radius:3px;margin-right:4px}
.hdr-r{display:flex;align-items:center;gap:7px;flex-shrink:0}
.sign-btn{padding:6px 14px;border-radius:30px;background:var(--cel);color:white;font-size:12px;font-weight:600;border:2px solid var(--cel);transition:.15s}
.sign-btn:hover{background:var(--cel-d)}
.usr-btn{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 4px;border-radius:30px;background:var(--cel-xl);border:1.5px solid var(--cel);cursor:pointer;transition:.15s}
.usr-btn:hover{background:var(--cel)}
.usr-av{width:26px;height:26px;border-radius:50%;background:var(--cel);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:white;font-family:var(--fd);flex-shrink:0}
.usr-nm{font-size:11px;font-weight:600;color:var(--cel-d)}
.usr-btn:hover .usr-nm{color:white}
.shell{display:flex;margin-top:calc(var(--h)+5px);min-height:calc(100vh - var(--h) - 5px)}
.lnav{width:200px;flex-shrink:0;position:sticky;top:calc(var(--h)+5px);height:calc(100vh - var(--h) - 5px);overflow-y:auto;scrollbar-width:none;background:var(--white);border-right:1px solid var(--br);padding:10px 0;display:none;flex-direction:column}
@media(min-width:860px){.lnav{display:flex}}
.ng{padding:0 8px;margin-bottom:5px}
.nlbl{font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:1.8px;text-transform:uppercase;padding:0 6px;margin-bottom:3px;display:block}
.nl{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:var(--rs);cursor:pointer;color:var(--tx2);font-size:12.5px;font-weight:500;transition:.15s;margin-bottom:1px}
.nl:hover{background:var(--cel-xl);color:var(--cel-d)}
.nl.on{background:var(--cel);color:white}
.nl svg{width:14px;height:14px;flex-shrink:0}
.nl-badge{margin-left:auto;background:var(--red);color:white;font-size:9px;border-radius:10px;padding:1px 5px;font-weight:700}
.nav-hr{height:1px;background:var(--br);margin:6px 10px}
.nl-live{display:flex;align-items:center;gap:6px;margin:4px 8px 7px;padding:7px 9px;background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);border-radius:var(--rs);cursor:pointer}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.5)}}
.nl-live-t{font-size:11px;font-weight:700;color:var(--red);font-family:var(--fd);letter-spacing:.5px}
.nl-live-c{font-size:10px;color:rgba(192,57,43,.5);margin-left:auto}
.main{flex:1;min-width:0;padding:18px 14px}
@media(min-width:860px){.main{padding:22px 20px}}
.rsb{width:280px;flex-shrink:0;position:sticky;top:calc(var(--h)+5px);height:calc(100vh - var(--h) - 5px);overflow-y:auto;padding:16px 13px;border-left:1px solid var(--br);background:var(--white);display:none;scrollbar-width:none}
@media(min-width:1200px){.rsb{display:block}}
.bnav{position:fixed;bottom:0;left:0;right:0;height:54px;background:var(--white);border-top:2px solid var(--cel);display:flex;align-items:center;z-index:300}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;cursor:pointer;color:var(--tx3);transition:.15s}
.bni.on{color:var(--cel-d)}
.bni svg{width:17px;height:17px}
.bni span{font-size:9px;font-weight:600;font-family:var(--fd);letter-spacing:.3px}
@media(min-width:860px){.bnav{display:none}}
@media(max-width:859px){body{padding-bottom:54px}}

/* ATOMS */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--br)}
.cp{padding:15px}.cs{padding:11px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.st{font-family:var(--fd);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;display:flex;align-items:center;gap:7px;color:var(--tx)}
.st::before{content:'';width:3px;height:13px;background:var(--cel);border-radius:2px;display:inline-block}
.sl{font-size:11px;color:var(--cel);cursor:pointer;font-weight:600}
.sl:hover{color:var(--cel-d);text-decoration:underline}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;font-family:var(--fd);letter-spacing:.8px;text-transform:uppercase}
.bc{background:var(--cel-xl);color:var(--cel-d);border:1px solid var(--br)}
.br-b{background:rgba(192,57,43,.1);color:#B03020;border:1px solid rgba(192,57,43,.2)}
.bg-b{background:rgba(39,174,96,.12);color:#1E8449;border:1px solid rgba(39,174,96,.25)}
.bv-b{background:rgba(139,92,246,.1);color:#6D28D9;border:1px solid rgba(139,92,246,.2)}
.bs{background:rgba(246,180,14,.12);color:#B7770D;border:1px solid rgba(246,180,14,.25)}
.bp{background:rgba(236,72,153,.12);color:#9D174D;border:1px solid rgba(236,72,153,.25)}
.btn{padding:7px 16px;border-radius:30px;font-size:12px;font-weight:600;transition:.15s;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-c{background:var(--cel);color:white;border:2px solid var(--cel)}
.btn-c:hover{background:var(--cel-d)}
.btn-o{background:transparent;border:2px solid var(--cel);color:var(--cel-d)}
.btn-o:hover{background:var(--cel-xl)}
.btn-red{background:var(--red);color:white;border:2px solid var(--red)}
.btn-g{background:var(--green);color:white;border:2px solid var(--green)}
.btn-pk{background:var(--pink);color:white;border:2px solid var(--pink)}
.btn-s{background:var(--sun);color:white;border:2px solid var(--sun)}
.btn-t{background:var(--teal);color:white;border:2px solid var(--teal)}
.btn-sm{padding:5px 11px;font-size:11px}
.fi{width:100%;background:var(--cel-xl);border:1.5px solid var(--br);border-radius:var(--rs);padding:9px 12px;font-size:13px;color:var(--tx);transition:.15s}
.fi:focus{border-color:var(--cel)}
.fi::placeholder{color:var(--tx3)}
.fl{display:block;font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.divhr{height:1px;background:var(--br);margin:12px 0}
.toasts{position:fixed;top:calc(var(--h)+12px);right:13px;z-index:600;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--white);border:1.5px solid var(--br);border-radius:var(--r);padding:9px 13px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px;box-shadow:var(--sh2);animation:tin .3s;min-width:190px;pointer-events:all}
.toast.ok{border-color:rgba(39,174,96,.5)}.toast.err{border-color:rgba(192,57,43,.5)}
@keyframes tin{from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1}}
.mbg{position:fixed;inset:0;background:rgba(26,39,68,.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px)}
.mdl{background:var(--white);border-radius:var(--rl);border:2px solid var(--cel);padding:22px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto;box-shadow:var(--sh2)}
.mdl-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mdl-t{font-family:var(--fd);font-size:19px;font-weight:600}
.cls{width:26px;height:26px;border-radius:50%;background:var(--cel-xl);display:flex;align-items:center;justify-content:center;color:var(--cel-d);cursor:pointer;border:none}
.cls:hover{background:var(--cel);color:white}
.cls svg{width:13px;height:13px}
.err-msg{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);border-radius:var(--rs);padding:8px 12px;font-size:12px;color:#B03020;margin-bottom:12px}

/* NEWS */
.nc{background:var(--white);border-radius:var(--r);border:1px solid var(--br);overflow:hidden;cursor:pointer;transition:.18s;display:flex;flex-direction:column}
.nc:hover{border-color:var(--cel);transform:translateY(-2px);box-shadow:var(--sh2)}
.nc-img{overflow:hidden;position:relative;background:var(--cel-xl)}
.nc-img.big{height:170px}.nc-img.sm{height:120px}
.nc-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.nc:hover .nc-img img{transform:scale(1.04)}
.nc-em{display:flex;align-items:center;justify-content:center;font-size:48px;width:100%;height:100%}
.nc-cat{position:absolute;top:8px;left:8px}
.nc-body{padding:12px;flex:1;display:flex;flex-direction:column}
.nc-tit{font-family:var(--fd);font-size:14px;font-weight:500;line-height:1.25;margin-bottom:5px;color:var(--tx)}
.nc-exc{font-size:11px;color:var(--tx2);line-height:1.55;margin-bottom:8px;flex:1}
.nc-ft{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--tx3);padding-top:8px;border-top:1px solid var(--br);margin-top:auto}
.nc-ac{display:flex;gap:8px}
.abt{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--tx2);background:none;transition:.15s;padding:0}
.abt:hover,.abt.lk{color:var(--cel-d)}
.abt svg{width:11px;height:11px}
.ng-grid{display:grid;gap:12px;grid-template-columns:1fr}
@media(min-width:540px){.ng-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1400px){.ng-grid{grid-template-columns:1fr 1fr 1fr}}
.sk{background:linear-gradient(90deg,var(--cel-xl) 25%,rgba(74,144,217,.1) 50%,var(--cel-xl) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--rs)}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

/* LIVE */
.lstrip{display:flex;gap:9px;overflow-x:auto;margin-bottom:18px;padding-bottom:3px;scrollbar-width:none}
.lmc{background:var(--white);border:1.5px solid var(--br);border-radius:var(--r);padding:10px 13px;cursor:pointer;flex-shrink:0;min-width:160px;transition:.15s}
.lmc:hover{border-color:var(--cel);box-shadow:var(--sh)}
.lmc.lv{border-color:rgba(192,57,43,.3);background:rgba(192,57,43,.04)}
.lms{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--tx3);margin-bottom:7px}
.lms.lv{color:var(--red)}
.lmt{display:flex;align-items:center;justify-content:space-between;gap:7px}
.ltm{text-align:center;flex:1}
.lem{font-size:20px;display:block;margin-bottom:2px}
.lnm{font-size:10px;color:var(--tx2);font-weight:500}
.lsc{font-family:var(--fd);font-size:24px;font-weight:700;color:var(--tx);min-width:42px;text-align:center}
.lsc.lv{color:var(--red)}

/* POLL */
.poll-q{font-family:var(--fd);font-size:14px;font-weight:500;margin-bottom:10px;color:var(--tx);line-height:1.3}
.po{background:var(--cel-xl);border-radius:var(--rs);padding:9px 12px;margin-bottom:6px;cursor:pointer;border:1.5px solid var(--br);position:relative;overflow:hidden;transition:.15s}
.po:hover{border-color:var(--cel)}
.po.voted{border-color:var(--cel-d)}
.po-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(74,144,217,.2);transition:width .7s}
.po-row{position:relative;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:500;color:var(--tx)}
.po-pct{font-weight:700;font-size:11px;color:var(--tx3)}
.po-pct.win{color:var(--cel-d)}
.po-meta{font-size:10px;color:var(--tx3);margin-top:6px}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--cel-xl);border-radius:var(--r);padding:3px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.tabx{flex-shrink:0;padding:6px 12px;text-align:center;border-radius:var(--rs);font-size:11px;font-weight:700;font-family:var(--fd);cursor:pointer;color:var(--tx2);transition:.15s;white-space:nowrap}
.tabx.on{background:var(--cel);color:white}

/* AUTH */
.auth-tabs{display:flex;background:var(--cel-xl);border-radius:var(--r);padding:3px;margin-bottom:16px}
.atab{flex:1;padding:7px;text-align:center;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;color:var(--tx2);transition:.15s;font-family:var(--fd)}
.atab.on{background:var(--cel);color:white}
.soc-btn{width:100%;padding:10px;border-radius:var(--rs);border:1.5px solid var(--br);background:var(--cel-xl);color:var(--tx);display:flex;align-items:center;justify-content:center;gap:9px;font-size:13px;font-weight:500;margin-bottom:8px;transition:.15s;cursor:pointer}
.soc-btn:hover{border-color:var(--cel)}
.or-div{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--tx3);font-size:11px}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--br)}

/* PRODE */
.prode-match{background:var(--white);border:1.5px solid var(--br);border-radius:var(--r);padding:13px;margin-bottom:10px;transition:.15s}
.prode-match:hover{border-color:var(--cel);box-shadow:var(--sh)}
.prode-match.locked{background:var(--cel-xl)}
.prode-teams{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.prode-team{flex:1;text-align:center}
.prode-em{font-size:26px;display:block;margin-bottom:3px}
.prode-nm{font-size:12px;font-weight:600;color:var(--tx)}
.prode-vs{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--tx3);flex-shrink:0}
.prode-pickers{display:flex;gap:6px}
.prode-btn{flex:1;padding:8px 4px;border-radius:var(--rs);font-size:11px;font-weight:700;font-family:var(--fd);cursor:pointer;border:1.5px solid var(--br);background:var(--white);color:var(--tx2);transition:.15s;text-align:center}
.prode-btn:hover{border-color:var(--cel);background:var(--cel-xl)}
.prode-btn.sel-h{background:var(--cel);border-color:var(--cel);color:white}
.prode-btn.sel-e{background:var(--sun);border-color:var(--sun);color:white}
.prode-btn.sel-a{background:var(--red);border-color:var(--red);color:white}

/* REVISTA */
.rev-article{background:var(--white);border-radius:var(--r);border:1px solid var(--br);overflow:hidden;cursor:pointer;transition:.2s;display:flex;flex-direction:column}

function useToasts() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback(({ msg, type='ok' }) => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }, []);
  return { toasts, add };
}

    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 5000);
    fetch(`${API}/api/news?${params}`, { signal: ctrl.signal })
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(d => {
        clearTimeout(timeout);
        setState({ posts: d.posts||[], total: d.pagination?.total||0, pages: d.pagination?.pages||1, loading: false, fromApi: true });
      })
      .catch(() => {
        clearTimeout(timeout);
        const filtered = cat ? STATIC_NEWS.filter(n => n.cat === cat) : STATIC_NEWS;
        setState({ posts: filtered, total: filtered.length, pages: 1, loading: false, fromApi: false });
      });
    return () => clearTimeout(timeout);
  }, [page, cat, search]);
  return state;
}

function Poll({ poll }) {
  const [voted, setVoted] = useState(null);
  const [vs, setVs] = useState([...poll.vs]);
  const tot = vs.reduce((a,b) => a+b, 0);
  return (
    <div>
      <div className="poll-q">{poll.q}</div>
      {poll.opts.map((o,i) => {
        const pct = voted!==null ? Math.round(vs[i]/tot*100) : null;
        const win = voted!==null && vs[i]===Math.max(...vs);
        return (
          <div key={i} className={`po${voted===i?' voted':''}`}
            onClick={() => { if (voted===null) { setVoted(i); setVs(v=>v.map((x,j)=>j===i?x+1:x)); } }}>
            {pct!==null && <div className="po-bar" style={{width:pct+'%'}}/>}
            <div className="po-row">
              <span>{o}</span>
              {pct!==null && <span className={`po-pct${win?' win':''}`}>{pct}%</span>}
            </div>
          </div>
        );
      })}
      <div className="po-meta">{voted===null ? `${tot.toLocaleString()} votos` : `✓ ${tot.toLocaleString()} votos`}</div>
    </div>
  );
}

function ArticlePage({ post, onBack, user, addToast }) {
  const [comments, setComments] = useState([]);
  const [cmtTxt, setCmtTxt] = useState('');
  const [sending, setSending] = useState(false);
  const token = localStorage.getItem('tl_token');
  useEffect(() => {
    if (!post._id || post._id.startsWith('s')) return;
    fetch(`${API}/api/comments?post=${post._id}`).then(r=>r.json()).then(d=>setComments(d.comments||[])).catch(()=>{});
  }, [post._id]);
  async function submit(e) {
    e.preventDefault();
    if (!cmtTxt.trim()) return;
    setSending(true);
    try {
      const r = await fetch(`${API}/api/comments`, { method:'POST', headers:{'Content-Type':'application/json',...(token&&{Authorization:`Bearer ${token}`})}, body:JSON.stringify({post:post._id,content:cmtTxt.trim(),author:user?.isGuest===false?(user.displayName||user.username):'Invitado'}) });
      const d = await r.json();
      if (r.ok) setComments(c => [d.comment,...c]);
      else setComments(c => [{_id:Date.now(),author:'Vos',content:cmtTxt.trim(),createdAt:new Date().toISOString()},...c]);
    } catch {
      setComments(c => [{_id:Date.now(),author:'Vos',content:cmtTxt.trim(),createdAt:new Date().toISOString()},...c]);
    }
    setCmtTxt('');
    setSending(false);
    addToast({msg:'Comentario publicado ✓',type:'ok'});
  }
  const cat = post.category || post.cat || 'Deportes';
  return (
    <div style={{maxWidth:720,margin:'0 auto'}}>
      <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:5,background:'none',color:'var(--cel)',marginBottom:16,fontSize:12,fontWeight:600,cursor:'pointer',border:'none'}}><Ic.Back style={{width:13,height:13}}/> Volver</button>
      {post.coverImage && <img src={post.coverImage} alt={post.title} style={{width:'100%',maxHeight:300,objectFit:'cover',borderRadius:'var(--rl)',border:'2px solid var(--cel)',marginBottom:16}} onError={e=>e.target.style.display='none'}/>}
      <div style={{marginBottom:10,display:'flex',gap:7,flexWrap:'wrap'}}>
        <span className="badge bc">{cat}</span>
        {post.meta?.sourceName && <span className="badge bc">📡 {post.meta.sourceName}</span>}
      </div>
      <h1 style={{fontFamily:'var(--fd)',fontSize:24,fontWeight:700,lineHeight:1.1,marginBottom:10}}>{post.title}</h1>
      <div style={{fontSize:12,color:'var(--tx3)',marginBottom:18}}>{new Date(post.publishedAt).toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'})}</div>
      <div style={{fontFamily:"'Merriweather',serif",fontSize:14,lineHeight:1.85,color:'var(--tx2)',marginBottom:18}}>
        {post.excerpt || post.content || 'Leé la nota completa en la fuente original.'}
        {post.meta?.sourceUrl && post.meta.sourceUrl !== '#' && (
          <div style={{marginTop:12}}>
            <a href={post.meta.sourceUrl} target="_blank" rel="noopener noreferrer" style={{color:'var(--cel)',fontWeight:600}}>→ Leer nota completa en {post.meta.sourceName}</a>
          </div>
        )}
      </div>
      <div className="card cp" style={{marginBottom:20}}><Poll poll={STATIC_POLLS[0]}/></div>
      <div className="sh"><div className="st">Comentarios</div><span style={{fontSize:11,color:'var(--tx3)'}}>{comments.length}</span></div>

/* ══════ AUTH MODAL ══════ */
function AuthModal({ onClose, onLogin, addToast }) {
  const [tab, setTab]     = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass]   = useState('');
  const [uname, setUname] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr]     = useState('');

  async function handleGoogle() {
    if (!window.__fbReady) { addToast({msg:'Ingresá con email (Firebase no configurado)',type:'err'}); return; }
    setLoading(true); setErr('');
    try {
      const cred = await window.__fbGoogleSignIn();
      // Intentar sync con backend, si falla usar datos de Firebase
      try {
        const r = await fetch(`${API}/api/auth/firebase-sync`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({uid:cred.user.uid,email:cred.user.email,displayName:cred.user.displayName}) });
        if (r.ok) { const d=await r.json(); localStorage.setItem('tl_token',d.token); onLogin({...d.user,isGuest:false}); }
        else throw new Error('sin backend');
      } catch {
        onLogin({displayName:cred.user.displayName||'Usuario',email:cred.user.email,rep:0,isGuest:false});
      }
      addToast({msg:'¡Bienvenido! 🇦🇷',type:'ok'}); onClose();
    } catch(e) { setErr(e.message||'Error con Google'); }
    setLoading(false);
  }

  async function handleEmail(e) {
    e.preventDefault(); setLoading(true); setErr('');
    try {
      const ep = tab==='login' ? '/api/auth/login' : '/api/auth/register';
      const body = tab==='login' ? {email,password:pass} : {email,password:pass,username:uname,displayName:uname};
      const r = await fetch(`${API}${ep}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error||'Error');
      localStorage.setItem('tl_token', d.token);
      onLogin({...d.user,isGuest:false});
      addToast({msg:`¡Bienvenido${tab==='reg'?' a Tribuna Libre':' de vuelta'}! 🇦🇷`,type:'ok'});
      onClose();
    } catch(e) {
      if (e.message.includes('fetch')||e.message.includes('Failed')||e.message.includes('NetworkError')) {
        // Sin backend: login local
        const u = {displayName:uname||email.split('@')[0], email, rep:50, isGuest:false};
        onLogin(u);
        addToast({msg:'Sesión local activa (backend offline) ✓',type:'ok'});
        onClose();
      } else { setErr(e.message); }
    }
    setLoading(false);
  }

  return (
    <div className="mbg" onClick={onClose}>
      <div className="mdl" onClick={e=>e.stopPropagation()}>
        <div className="mdl-h">
          <div className="mdl-t" style={{display:'flex',alignItems:'center',gap:9}}>
            <img src="https://raw.githubusercontent.com/bioscanrural/tribunalibre/refs/heads/main/imagenes/logochico.png"
              style={{height:34,width:34,borderRadius:'50%',border:'2px solid var(--cel)',objectFit:'cover'}}
              onError={e=>e.target.style.display='none'} alt="Logo"/>
            <span>Tribuna <span style={{color:'var(--cel)'}}>Libre</span></span>
          </div>
          <button className="cls" onClick={onClose}><Ic.X/></button>
        </div>
        <div className="auth-tabs">
          <div className={`atab${tab==='login'?' on':''}`} onClick={()=>{setTab('login');setErr('');}}>Ingresar</div>
          <div className={`atab${tab==='reg'?' on':''}`} onClick={()=>{setTab('reg');setErr('');}}>Registrarse</div>
        </div>
        {err && <div className="err-msg">⚠️ {err}</div>}
        <button className="soc-btn" onClick={handleGoogle} disabled={loading}><span style={{fontSize:18}}>🔵</span> Continuar con Google</button>
        <div className="or-div">o con tu correo</div>
        <form onSubmit={handleEmail}>
          {tab==='reg' && (
            <div style={{marginBottom:10}}>
              <label className="fl">Usuario</label>
              <div style={{position:'relative'}}>
                <input className="fi" value={uname} onChange={e=>setUname(e.target.value)} placeholder="mi_usuario" required style={{paddingLeft:34}}/>
                <Ic.Lock style={{width:13,height:13,position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--tx3)'}}/>
              </div>
            </div>
          )}
          <div style={{marginBottom:10}}>
            <label className="fl">Email</label>
            <div style={{position:'relative'}}>
              <input className="fi" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="vos@correo.com" required style={{paddingLeft:34}}/>
              <Ic.Mail style={{width:13,height:13,position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--tx3)'}}/>
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <label className="fl">Contraseña</label>
            <div style={{position:'relative'}}>
              <input className="fi" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required style={{paddingLeft:34}}/>
              <Ic.Lock style={{width:13,height:13,position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--tx3)'}}/>
            </div>
          </div>
          <button type="submit" className="btn btn-c" style={{width:'100%',justifyContent:'center'}} disabled={loading}>
            {loading ? 'Un momento...' : (tab==='login'?'Ingresar':'Crear cuenta gratis')}
          </button>
        </form>
        <div className="divhr"/>
        <button onClick={()=>{onLogin({displayName:'Invitado',rep:0,isGuest:true});addToast({msg:'Entraste como invitado 👋',type:'ok'});onClose();}}
          className="btn btn-o" style={{width:'100%',justifyContent:'center',fontSize:12}}>Entrar como invitado</button>
      </div>
    </div>
  );
}

/* ══════ LOGO ══════ */
function Logo({ onClick }) {
  const [failed, setFailed] = useState(false);
  return (
    <div className="logo-w" onClick={onClick}>
      {!failed ? (
        <img className="logo-img" src="https://raw.githubusercontent.com/bioscanrural/tribunalibre/refs/heads/main/imagenes/logochico.png" alt="Logo" onError={()=>setFailed(true)}/>
      ) : (
        <div className="logo-fb">TL</div>
      )}
      <div className="logo-txt">
        <div className="logo-main">Tribuna Libre</div>
        <div className="logo-sub">Red de Periodismo <b>Deportivo</b></div>
      </div>
    </div>
  );
}

/* ══════ RIGHT SIDEBAR ══════ */
function RightSidebar({ onNav, posts=[] }) {
  return (
    <div style={{display:'flex',flexDirection:'column',gap:15}}>
      {posts.length>0 && (
        <div>
          <div className="sh"><div className="st">Más recientes</div></div>
          <div className="card cs">
            {posts.slice(0,5).map((p,i) => (
              <div key={p._id} style={{paddingBottom:9,marginBottom:9,borderBottom:'1px solid var(--br)'}}>
                <div style={{display:'flex',gap:6,marginBottom:3}}>
                  <span style={{fontFamily:'var(--fd)',fontWeight:700,color:'var(--tx3)',fontSize:13,width:18}}>{i+1}</span>
                  <div style={{fontSize:12,fontWeight:500,color:'var(--tx)',lineHeight:1.25}}>{p.title}</div>
                </div>
                {p.meta?.sourceName && <div style={{fontSize:10,color:'var(--tx3)',paddingLeft:24}}>📡 {p.meta.sourceName}</div>}
              </div>
            ))}
          </div>
        </div>
      )}
      <div>
        <div className="sh"><div className="st">Secciones</div></div>
        <div style={{display:'grid',gap:6}}>
          {[{id:'comunidad',em:'👥',l:'Comunidad',c:'var(--cel-d)',bg:'var(--cel-xl)'},
            {id:'streaming',em:'📡',l:'Streaming',c:'var(--red)',bg:'rgba(192,57,43,.07)'},
            {id:'prode',em:'🏆',l:'El Prode',c:'#B7770D',bg:'#FFFBEB'},
            {id:'copa',em:'🌎',l:'Copa del Mundo',c:'var(--cel-d)',bg:'var(--cel-xl)'},
            {id:'revista',em:'✏️',l:'Revista Juvenil',c:'#9D174D',bg:'#FDF2F8'},
          ].map((s,i) => (
            <div key={i} onClick={()=>onNav(s.id)}
              style={{background:s.bg,border:`1px solid ${s.c}22`,borderRadius:'var(--rs)',padding:'8px 11px',cursor:'pointer',display:'flex',alignItems:'center',gap:8,transition:'.15s'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor=s.c}
              onMouseLeave={e=>e.currentTarget.style.borderColor=s.c+'22'}>
              <span style={{fontSize:14}}>{s.em}</span>
              <span style={{fontSize:12,fontWeight:600,color:s.c}}>{s.l}</span>
            </div>
          ))}
        </div>
      </div>
      <div>
        <div className="sh"><div className="st">El VAR</div></div>
        <div className="card cp"><Poll poll={STATIC_POLLS[0]}/></div>
      </div>
      <div>
        <div className="sh"><div className="st" style={{color:'var(--red)'}}><div className="ldot"/>En Vivo</div></div>
        {STATIC_LIVE.filter(e=>e.live).map(e => (
          <div key={e.id} className="card cs" style={{marginBottom:7,cursor:'pointer'}} onClick={()=>onNav('live')}>
            <div style={{fontSize:9,fontWeight:700,color:'var(--red)',marginBottom:4,display:'flex',alignItems:'center',gap:4}}>
              <div style={{width:5,height:5,borderRadius:'50%',background:'var(--red)',animation:'pulse 1.4s infinite'}}/>EN VIVO · {e.min}
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:12,fontWeight:500}}>{e.sp} {e.h}</span>
              <span style={{fontFamily:'var(--fd)',fontSize:16,fontWeight:700,color:'var(--red)'}}>{e.sh}-{e.sa}</span>
              <span style={{fontSize:12,fontWeight:500}}>{e.a}</span>
            </div>
          </div>
        ))}
      </div>
      <div>
        <div className="sh"><div className="st">Trending</div></div>
        <div className="card cs">
          {['#Superclásico2025','#LosPumas','#Colapinto2025','#LigaProfesional','#Copa26'].map((tag,i) => (
            <div key={i} className="tri">
              <div className={`trnum${i<2?' hot':''}`}>#{i+1}</div>
              <div><div className="trn">{tag}{i<2&&' 🔥'}</div><div className="trc">{Math.round((7000-i*800)/100)*100} posts</div></div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════ NAV CONFIG ══════════════════════════ */
// FIX: Agregadas las secciones faltantes (comunidad y streaming)
const NAV = [
  {id:'home',      l:'Inicio',         icon:'Home'},
  {id:'news',      l:'Noticias',       icon:'News'},
  {id:'comunidad', l:'Comunidad',      icon:'Com'},    // ← NUEVA
  {id:'streaming', l:'Streaming',      icon:'Stream'}, // ← NUEVA
  {id:'prode',     l:'El Prode',       icon:'Prode'},
  {id:'copa',      l:'Copas',          icon:'Copa'},
  {id:'revista',   l:'Revista Juvenil',icon:'Rev'},
  {id:'live',      l:'En Vivo',        icon:'Live'},
  {id:'forum',     l:'Debates',        icon:'Forum'},
  {id:'profile',   l:'Mi perfil',      icon:'Profile'},
];
const MOBILE_NAV = [
  {id:'home',      l:'Inicio',    icon:'Home'},
  {id:'news',      l:'Noticias',  icon:'News'},
  {id:'comunidad', l:'Comunidad', icon:'Com'},    // ← NUEVA
  {id:'streaming', l:'Streaming', icon:'Stream'}, // ← NUEVA
  {id:'profile',   l:'Perfil',    icon:'Profile'},
];

/* ══════════════════════════ APP ══════════════════════════ */
function App() {
  const [page, setPage]     = useState('home');
  const [article, setArticle] = useState(null);
  const [user, setUser]     = useState({ isGuest: true });
  const [authOpen, setAuthOpen] = useState(false);
  const { toasts, add: addToast } = useToasts();
  const { posts } = useNews(1,'','');

  // Restaurar sesión JWT
  useEffect(() => {
    const token = localStorage.getItem('tl_token');
    if (!token) return;
    fetch(`${API}/api/auth/me`, { headers:{ Authorization:`Bearer ${token}` } })
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d?.user) setUser({...d.user, isGuest:false}); })
      .catch(() => localStorage.removeItem('tl_token'));
  }, []);

  function nav(p) { setPage(p); setArticle(null); window.scrollTo(0,0); }
  function openArticle(p) { setArticle(p); setPage('article'); window.scrollTo(0,0); }
  function logout() {
    localStorage.removeItem('tl_token');
    if (window.__fbSignOut) window.__fbSignOut().catch(()=>{});
    setUser({ isGuest: true });
    addToast({ msg:'Sesión cerrada', type:'ok' });
    nav('home');
  }

  return (
    <>
      {/* TOASTS */}
      <div className="toasts">
        {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}><span>{t.type==='ok'?'✅':'⚠️'}</span>{t.msg}</div>)}
      </div>

      {/* FLAG STRIPE */}
      <div className="flag-stripe"/>

      {/* TOPBAR */}
      <div className="hdr">
        <Logo onClick={()=>nav('home')}/>
        <div className="ticker">
          <div className="tk-tr">
            {[...TICKER_D,...TICKER_D].map((t,i) => <div key={i} className="tk-it"><b>{t.l}</b>{t.t}</div>)}
          </div>
        </div>
        <div className="hdr-r">
          {user.isGuest ? (
            <button className="sign-btn" onClick={()=>setAuthOpen(true)}>Ingresar / Registrarse</button>
          ) : (
            <div className="usr-btn" onClick={()=>nav('profile')}>
              <div className="usr-av">{(user.displayName||user.username||'U')[0].toUpperCase()}</div>
              <span className="usr-nm">{user.displayName||user.username}</span>
            </div>
          )}
        </div>
      </div>

      <div className="shell">
        {/* LEFT NAV */}
        <nav className="lnav">
          <div className="nl-live" onClick={()=>nav('live')}>
            <div className="ldot"/><span className="nl-live-t">EN VIVO</span><span className="nl-live-c">3</span>
          </div>
          <div className="ng">
            <span className="nlbl">Navegación</span>
            {NAV.map(n => {
              const Icon = Ic[n.icon];
              return (
                <div key={n.id} className={`nl${page===n.id||(page==='article'&&n.id==='news')?' on':''}`} onClick={()=>nav(n.id)}>
                  <Icon/><span>{n.l}</span>
                  {n.id==='prode'     && <span className="nl-badge" style={{background:'var(--sun)'}}>!</span>}
                  {n.id==='live'      && <span className="nl-badge">3</span>}
                  {n.id==='comunidad' && <span className="nl-badge" style={{background:'var(--cel-d)'}}>●</span>}
                  {n.id==='streaming' && <span className="nl-badge" style={{background:'var(--red)'}}>▶</span>}
                </div>
              );
            })}
          </div>
          <div className="nav-hr"/>
          <div className="ng">
            <span className="nlbl">Equipos</span>
            {[['🔴','River Plate'],['🔵','Boca Juniors'],['⚡','Racing Club'],['🏉','Los Pumas']].map(([em,nm],i) => (
              <div key={i} className="nl"><span style={{fontSize:14,width:20,textAlign:'center'}}>{em}</span>{nm}</div>
            ))}
          </div>
          {!user.isGuest && (
            <><div className="nav-hr"/>
            <div className="ng">
              <div className="nl" onClick={logout} style={{color:'var(--red)'}}><Ic.X style={{width:13,height:13}}/><span>Cerrar sesión</span></div>
            </div></>
          )}
        </nav>

        {/* MAIN CONTENT — FIX: Routing completo con todas las secciones */}
        <main className="main">
          <div style={{maxWidth:760,margin:'0 auto'}}>
            {page==='home'      && <HomePage onArticle={openArticle} onNav={nav}/>}
            {page==='news'      && <NewsPage onArticle={openArticle}/>}
            {page==='article'   && article && <ArticlePage post={article} onBack={()=>nav('news')} user={user} addToast={addToast}/>}
            {page==='comunidad' && <ComunidadPage user={user} addToast={addToast} onNav={nav}/>}
            {page==='streaming' && <StreamingPage addToast={addToast}/>}
            {page==='prode'     && <ProdePage user={user} addToast={addToast}/>}
            {page==='copa'      && <CopaPage/>}
            {page==='revista'   && <RevistaPage user={user} addToast={addToast}/>}
            {page==='live'      && (
              <div>
                <div className="sh"><div className="st" style={{color:'var(--red)'}}><div className="ldot"/>En Vivo</div></div>
                <LiveStrip onNav={nav}/>
                <div className="card cp" style={{marginTop:14}}><Poll poll={STATIC_POLLS[0]}/></div>
              </div>
            )}
            {page==='forum' && (
              <div>
                <div className="sh"><div className="st">Debates</div></div>
                {STATIC_POLLS.map(p => <div key={p.id} className="card cp" style={{marginBottom:12}}><Poll poll={p}/></div>)}
              </div>
            )}
            {page==='profile' && (
              <div>
                <div style={{background:'linear-gradient(135deg,var(--cel-d),var(--cel))',borderRadius:'var(--rl)',padding:24,textAlign:'center',marginBottom:16}}>
                  <div style={{width:70,height:70,borderRadius:'50%',background:'rgba(255,255,255,.2)',margin:'0 auto 12px',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--fd)',fontSize:28,fontWeight:700,color:'white',border:'2.5px solid rgba(255,255,255,.4)'}}>
                    {user.isGuest ? '?' : (user.displayName||user.username||'U')[0].toUpperCase()}
                  </div>
                  <div style={{fontFamily:'var(--fd)',fontSize:22,fontWeight:700,color:'white',marginBottom:5}}>{user.isGuest?'Invitado':(user.displayName||user.username)}</div>
                  {user.isGuest ? (
                    <button className="btn btn-sm" style={{background:'rgba(255,255,255,.2)',border:'1.5px solid rgba(255,255,255,.5)',color:'white',borderRadius:30}} onClick={()=>setAuthOpen(true)}>Crear cuenta gratis</button>
                  ) : (
                    <div style={{fontSize:13,color:'rgba(255,255,255,.75)'}}>{user.email}</div>
                  )}
                </div>
                {!user.isGuest && (
                  <div style={{display:'flex',gap:8,marginBottom:14}}>
                    <button className="btn btn-o btn-sm" style={{flex:1,justifyContent:'center'}}>Editar perfil</button>
                    <button className="btn btn-red btn-sm" style={{flex:1,justifyContent:'center'}} onClick={logout}>Cerrar sesión</button>
                  </div>
                )}
              </div>
            )}
          </div>
        </main>

        <aside className="rsb"><RightSidebar onNav={nav} posts={posts}/></aside>
      </div>

      {/* MOBILE BOTTOM NAV */}
      <div className="bnav">
        {MOBILE_NAV.map(n => {
          const Icon = Ic[n.icon];
          return (
            <div key={n.id} className={`bni${page===n.id?' on':''}`} onClick={()=>nav(n.id)}>
              <Icon/><span>{n.l}</span>
            </div>
          );
        })}
      </div>

      {authOpen && <AuthModal onClose={()=>setAuthOpen(false)} onLogin={setUser} addToast={addToast}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
