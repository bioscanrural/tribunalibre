<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tribuna Libre · Red de Periodismo Deportivo Argentina</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ══════════════════════════════════════════
   ARGENTINA PALETTE
══════════════════════════════════════════ */
:root {
  --cel:    #4A90D9;
  --cel-d:  #2E6FB5;
  --cel-l:  #74ACDF;
  --cel-xl: #D6EAFA;
  --cel-bg: #F0F7FF;
  --white:  #FFFFFF;
  --sun:    #F6B40E;
  --red:    #C0392B;
  --tx:     #1A2744;
  --tx2:    #4A5568;
  --tx3:    #9FAEC0;
  --bg:     #F0F7FF;
  --card:   #FFFFFF;
  --card2:  #F8FBFF;
  --br:     rgba(74,144,217,.18);
  --brm:    rgba(74,144,217,.32);
  --sh:     0 4px 24px rgba(74,144,217,.15);
  --sh2:    0 8px 40px rgba(74,144,217,.22);
  --r:      12px;
  --rs:     8px;
  --rl:     18px;
  --fw:     'DM Sans', sans-serif;
  --fd:     'Oswald', sans-serif;
  --fs:     'Merriweather', serif;
  --h:      62px;
}

/* ══════════════════════════════════════════
   BASE
══════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0 }
html, body {
  background: var(--bg); color: var(--tx);
  font-family: var(--fw); min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
h1,h2,h3,h4 { font-family: var(--fd); }
button { cursor: pointer; border: none; outline: none; font-family: var(--fw); }
input, textarea, select { outline: none; font-family: var(--fw); }
a { color: inherit; text-decoration: none; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--cel-l); border-radius: 4px; }
::selection { background: var(--cel); color: #fff; }
img { max-width: 100%; height: auto; }

/* ══════════════════════════════════════════
   FLAG STRIPE — decorative top bar
══════════════════════════════════════════ */
.flag-stripe {
  height: 6px;
  background: linear-gradient(90deg, var(--cel) 33.33%, var(--white) 33.33%, var(--white) 66.66%, var(--cel) 66.66%);
  flex-shrink: 0;
}

/* ══════════════════════════════════════════
   HEADER / TOPBAR
══════════════════════════════════════════ */
.hdr {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
}
.hdr-inner {
  height: var(--h); background: var(--white);
  border-bottom: 2px solid var(--cel);
  display: flex; align-items: center; padding: 0 16px;
  gap: 12px; box-shadow: var(--sh);
}
.logo-wrap {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; flex-shrink: 0; text-decoration: none;
}
.logo-img {
  height: 44px; width: 44px; border-radius: 50%;
  border: 2px solid var(--cel); object-fit: cover;
  background: var(--cel-bg);
  flex-shrink: 0;
}
.logo-fallback {
  height: 44px; width: 44px; border-radius: 50%;
  border: 2px solid var(--cel); background: var(--cel);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow: hidden; position: relative;
}
.logo-flag-strip {
  position: absolute; left: 0; right: 0;
  top: 0; bottom: 0; display: flex; flex-direction: column;
}
.lfs-c { flex: 1; background: var(--cel); }
.lfs-w { flex: 1; background: var(--white); }
.lfs-c2 { flex: 1; background: var(--cel); }
.logo-tl {
  position: relative; z-index: 1;
  font-family: var(--fd); font-size: 16px; font-weight: 700;
  color: var(--cel); background: rgba(255,255,255,.85);
  border-radius: 4px; padding: 1px 5px; letter-spacing: 1px;
}
.logo-text { display: flex; flex-direction: column; line-height: 1.1; }
.logo-main {
  font-family: var(--fd); font-size: 20px; font-weight: 700;
  color: var(--cel-d); letter-spacing: 1px; line-height: 1;
}
.logo-sub {
  font-size: 10px; font-weight: 500; color: var(--tx2);
  letter-spacing: .5px;
}
.logo-arg { color: var(--cel); font-weight: 700; }

/* Ticker */
.ticker {
  flex: 1; overflow: hidden; min-width: 0;
  border-left: 3px solid var(--cel); padding-left: 10px;
}
.ticker-tr {
  display: flex; gap: 32px;
  animation: ticker 35s linear infinite; white-space: nowrap;
}
@keyframes ticker {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.tk { font-size: 12px; color: var(--tx2); flex-shrink: 0; }
.tk b { color: var(--cel-d); font-size: 10px; font-weight: 700;
  background: var(--cel-xl); padding: 1px 5px; border-radius: 3px; margin-right: 5px; }

/* Header actions */
.hdr-r {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.hib {
  width: 32px; height: 32px; border-radius: var(--rs);
  background: transparent; color: var(--tx2);
  display: flex; align-items: center; justify-content: center;
  transition: .15s; position: relative;
  border: 1px solid transparent;
}
.hib:hover { background: var(--cel-xl); color: var(--cel-d); border-color: var(--br); }
.hib svg { width: 17px; height: 17px; }
.ndot {
  position: absolute; top: 4px; right: 4px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--red); border: 2px solid var(--white);
}
.usr-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px 5px 5px; border-radius: 30px;
  background: var(--cel-xl); border: 1.5px solid var(--cel);
  cursor: pointer; transition: .15s;
}
.usr-btn:hover { background: var(--cel); color: white; }
.usr-btn:hover .usr-nm { color: white; }
.usr-av {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--cel); display: flex; align-items: center;
  justify-content: center; font-weight: 700; font-size: 11px;
  color: white; font-family: var(--fd); letter-spacing: .5px; flex-shrink: 0;
}
.usr-nm { font-size: 12px; font-weight: 600; color: var(--cel-d); }
.sign-btn {
  padding: 7px 16px; border-radius: 30px;
  background: var(--cel); color: white; font-size: 12px; font-weight: 600;
  transition: .15s; border: 2px solid var(--cel);
}
.sign-btn:hover { background: var(--cel-d); border-color: var(--cel-d); }

/* ══════════════════════════════════════════
   SHELL LAYOUT
══════════════════════════════════════════ */
.shell {
  display: flex; margin-top: calc(var(--h) + 6px);
  min-height: calc(100vh - var(--h) - 6px);
}
/* Left nav */
.lnav {
  width: 210px; flex-shrink: 0;
  position: sticky; top: calc(var(--h) + 6px);
  height: calc(100vh - var(--h) - 6px);
  overflow-y: auto; scrollbar-width: none;
  background: var(--white); border-right: 1px solid var(--br);
  padding: 14px 0; display: none; flex-direction: column;
}
@media(min-width: 900px) { .lnav { display: flex; } }
.nav-sec { padding: 0 10px; margin-bottom: 6px; }
.nav-lbl {
  font-size: 9px; font-weight: 700; color: var(--tx3);
  letter-spacing: 1.8px; text-transform: uppercase;
  padding: 0 7px; margin-bottom: 4px; display: block;
}
.nl {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 9px; border-radius: var(--rs);
  cursor: pointer; color: var(--tx2); font-size: 13px;
  font-weight: 500; transition: .15s; margin-bottom: 2px;
}
.nl:hover { background: var(--cel-xl); color: var(--cel-d); }
.nl.on { background: var(--cel); color: white; box-shadow: 0 3px 10px rgba(74,144,217,.35); }
.nl svg { width: 15px; height: 15px; flex-shrink: 0; }
.nl-badge {
  margin-left: auto; background: var(--red); color: white;
  font-size: 9px; font-weight: 700; border-radius: 10px; padding: 1px 6px;
}
.nl-live {
  display: flex; align-items: center; gap: 6px;
  margin: 6px 10px 8px; padding: 8px 10px;
  background: rgba(192,57,43,.08); border: 1px solid rgba(192,57,43,.2);
  border-radius: var(--rs); cursor: pointer; transition: .15s;
}
.nl-live:hover { border-color: rgba(192,57,43,.4); }
.ldot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: pulse 1.4s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .35; transform: scale(1.5); } }
.nl-live-txt { font-size: 11px; font-weight: 700; color: var(--red); font-family: var(--fd); letter-spacing: .5px; }
.nl-live-ct { font-size: 10px; color: rgba(192,57,43,.5); margin-left: auto; }
.nav-hr { height: 1px; background: var(--br); margin: 8px 12px; }
.team-row {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 9px; border-radius: var(--rs);
  cursor: pointer; transition: .15s; margin-bottom: 1px;
}
.team-row:hover { background: var(--cel-xl); }
.team-em { font-size: 14px; width: 22px; text-align: center; }
.team-nm { font-size: 12px; font-weight: 500; color: var(--tx2); }
.team-nm small { display: block; font-size: 10px; color: var(--tx3); font-weight: 400; }

/* MAIN */
.main { flex: 1; min-width: 0; padding: 20px 16px; }
@media(min-width: 900px) { .main { padding: 24px 22px; } }

/* RIGHT SIDEBAR */
.rsb {
  width: 295px; flex-shrink: 0;
  position: sticky; top: calc(var(--h) + 6px);
  height: calc(100vh - var(--h) - 6px);
  overflow-y: auto; padding: 18px 14px;
  border-left: 1px solid var(--br);
  background: var(--white); display: none;
  scrollbar-width: none;
}
@media(min-width: 1200px) { .rsb { display: block; } }

/* MOBILE NAV */
.bnav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
  background: var(--white); border-top: 2px solid var(--cel);
  display: flex; align-items: center; z-index: 300;
  box-shadow: 0 -4px 20px rgba(74,144,217,.12);
}
.bni {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 2px; padding: 6px 2px; cursor: pointer;
  color: var(--tx3); transition: .15s;
}
.bni.on { color: var(--cel-d); }
.bni.on svg { filter: drop-shadow(0 0 3px rgba(74,144,217,.5)); }
.bni svg { width: 18px; height: 18px; }
.bni span { font-size: 9px; font-weight: 600; font-family: var(--fd); letter-spacing: .3px; }
@media(min-width: 900px) { .bnav { display: none; } }
@media(max-width: 899px) { body { padding-bottom: 56px; } }

/* ══════════════════════════════════════════
   ATOMS
══════════════════════════════════════════ */
.card { background: var(--card); border-radius: var(--r); border: 1px solid var(--br); }
.cp { padding: 16px; } .cs { padding: 12px; }
.sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 13px; }
.st {
  font-family: var(--fd); font-size: 14px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1.2px;
  display: flex; align-items: center; gap: 8px; color: var(--tx);
}
.st::before {
  content: ''; width: 4px; height: 16px; background: var(--cel);
  border-radius: 2px; display: inline-block;
}
.sl { font-size: 11px; color: var(--cel); cursor: pointer; font-weight: 600; transition: .15s; }
.sl:hover { color: var(--cel-d); text-decoration: underline; }

.badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 20px; font-size: 9px;
  font-weight: 700; font-family: var(--fd); letter-spacing: .8px; text-transform: uppercase;
}
.bc { background: var(--cel-xl); color: var(--cel-d); border: 1px solid var(--br); }
.br-badge { background: rgba(192,57,43,.1); color: #B03020; border: 1px solid rgba(192,57,43,.2); }
.bg-badge { background: rgba(22,163,74,.1); color: #15803D; border: 1px solid rgba(22,163,74,.2); }
.bp-badge { background: rgba(246,180,14,.12); color: #B45309; border: 1px solid rgba(246,180,14,.25); }
.bpur { background: rgba(99,102,241,.1); color: #4F46E5; border: 1px solid rgba(99,102,241,.2); }
.banon { background: rgba(148,163,184,.12); color: #475569; border: 1px solid rgba(148,163,184,.25); }

.btn {
  padding: 8px 18px; border-radius: 30px; font-size: 12px; font-weight: 600;
  transition: .15s; cursor: pointer; display: inline-flex; align-items: center; gap: 7px;
}
.btn-c { background: var(--cel); color: white; border: 2px solid var(--cel); }
.btn-c:hover { background: var(--cel-d); border-color: var(--cel-d); box-shadow: 0 4px 14px rgba(74,144,217,.4); }
.btn-out { background: transparent; border: 2px solid var(--cel); color: var(--cel-d); }
.btn-out:hover { background: var(--cel-xl); }
.btn-red { background: var(--red); color: white; border: 2px solid var(--red); }
.btn-red:hover { background: #A93226; }
.btn-sun { background: var(--sun); color: white; border: 2px solid var(--sun); }
.btn-sm { padding: 5px 12px; font-size: 11px; }

.fi {
  width: 100%; background: var(--card2); border: 1.5px solid var(--br);
  border-radius: var(--rs); padding: 9px 12px; font-size: 13px; color: var(--tx);
  transition: .15s;
}
.fi:focus { border-color: var(--cel); box-shadow: 0 0 0 3px rgba(74,144,217,.1); }
.fi::placeholder { color: var(--tx3); }
.fl { display: block; font-size: 10px; font-weight: 700; color: var(--tx3); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 5px; }

.divhr { height: 1px; background: var(--br); margin: 14px 0; }

/* Toast */
.toasts { position: fixed; top: calc(var(--h) + 14px); right: 14px; z-index: 600; display: flex; flex-direction: column; gap: 7px; }
.toast {
  background: var(--white); border: 1.5px solid var(--br); border-radius: var(--r);
  padding: 10px 14px; font-size: 12px; font-weight: 600; color: var(--tx);
  display: flex; align-items: center; gap: 8px;
  box-shadow: var(--sh2); animation: tin .3s ease; min-width: 200px;
}
.toast.ok { border-color: rgba(22,163,74,.4); }
.toast.err { border-color: rgba(192,57,43,.4); }
@keyframes tin { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* Modal */
.mbg {
  position: fixed; inset: 0; background: rgba(26,39,68,.6); z-index: 500;
  display: flex; align-items: center; justify-content: center; padding: 16px;
  backdrop-filter: blur(8px);
}
.mdl {
  background: var(--white); border-radius: var(--rl);
  border: 2px solid var(--cel); padding: 24px; width: 100%;
  max-width: 440px; max-height: 88vh; overflow-y: auto;
  box-shadow: var(--sh2);
}
.mdl-h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.mdl-t { font-family: var(--fd); font-size: 20px; font-weight: 600; color: var(--tx); }
.cls { width: 28px; height: 28px; border-radius: 50%; background: var(--cel-xl); display: flex; align-items: center; justify-content: center; color: var(--cel-d); transition: .15s; }
.cls:hover { background: var(--cel); color: white; }
.cls svg { width: 14px; height: 14px; }

/* ══════════════════════════════════════════
   NEWS CARDS
══════════════════════════════════════════ */
.nc {
  background: var(--card); border-radius: var(--r); border: 1px solid var(--br);
  overflow: hidden; cursor: pointer; transition: .2s; display: flex; flex-direction: column;
}
.nc:hover {
  border-color: var(--cel); transform: translateY(-3px);
  box-shadow: var(--sh2);
}
.nc-img {
  display: flex; align-items: center; justify-content: center;
  background: var(--cel-xl); overflow: hidden; position: relative;
}
.nc-img.big { height: 180px; }
.nc-img.sm { height: 130px; }
.nc-img img { width: 100%; height: 100%; object-fit: cover; }
.nc-img-em { font-size: 52px; }
.nc-cat { position: absolute; top: 10px; left: 10px; }
.nc-body { padding: 13px; flex: 1; display: flex; flex-direction: column; }
.nc-tit {
  font-family: var(--fd); font-size: 15px; font-weight: 500;
  line-height: 1.25; margin-bottom: 6px; color: var(--tx);
}
.nc-exc { font-size: 12px; color: var(--tx2); line-height: 1.55; margin-bottom: 9px; flex: 1; }
.nc-ft {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 10px; color: var(--tx3); padding-top: 9px; border-top: 1px solid var(--br); margin-top: auto;
}
.nc-ac { display: flex; gap: 9px; }
.abt { display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--tx2); background: none; transition: .15s; padding: 0; }
.abt:hover, .abt.lk { color: var(--cel-d); }
.abt svg { width: 12px; height: 12px; }

/* HERO */
.hero {
  position: relative; border-radius: var(--rl); overflow: hidden;
  cursor: pointer; margin-bottom: 20px; border: 2px solid var(--cel);
  transition: .2s; box-shadow: var(--sh);
}
.hero:hover { box-shadow: var(--sh2); }
.hero-bg {
  height: 360px; display: flex; align-items: center; justify-content: center;
  font-size: 96px; background: linear-gradient(135deg, var(--cel-xl), var(--cel-bg));
}
@media(min-width: 900px) { .hero-bg { height: 440px; } }
.hero-bg img { width: 100%; height: 100%; object-fit: cover; }
.hero-ov {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 20px;
  background: linear-gradient(transparent, rgba(26,39,68,.96));
}
.hero-tit { font-family: var(--fd); font-size: 26px; font-weight: 700; line-height: 1.1; color: #fff; margin-bottom: 8px; }
@media(min-width: 900px) { .hero-tit { font-size: 36px; } }
.hero-meta { font-size: 12px; color: rgba(255,255,255,.6); }

/* NEWS GRID */
.ng { display: grid; gap: 14px; grid-template-columns: 1fr; }
@media(min-width: 560px) { .ng { grid-template-columns: 1fr 1fr; } }
@media(min-width: 1400px) { .ng { grid-template-columns: 1fr 1fr 1fr; } }

/* ══════════════════════════════════════════
   LIVE SCORES
══════════════════════════════════════════ */
.lstrip { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 3px; scrollbar-width: none; }
.lmc {
  background: var(--card); border: 1.5px solid var(--br); border-radius: var(--r);
  padding: 11px 14px; cursor: pointer; flex-shrink: 0; min-width: 170px; transition: .15s;
}
.lmc:hover { border-color: var(--cel); box-shadow: var(--sh); }
.lmc.lv { border-color: rgba(192,57,43,.35); background: rgba(192,57,43,.04); }
.lms { display: flex; align-items: center; gap: 4px; font-size: 9px; font-weight: 700; color: var(--tx3); margin-bottom: 8px; }
.lms.lv { color: var(--red); }
.lmt { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.ltm { text-align: center; flex: 1; }
.lem { font-size: 22px; display: block; margin-bottom: 2px; }
.lnm { font-size: 10px; color: var(--tx2); font-weight: 500; }
.lsc { font-family: var(--fd); font-size: 26px; font-weight: 700; color: var(--tx); min-width: 44px; text-align: center; }
.lsc.lv { color: var(--red); }

/* ══════════════════════════════════════════
   POLL
══════════════════════════════════════════ */
.poll-q { font-family: var(--fd); font-size: 14px; font-weight: 500; margin-bottom: 11px; color: var(--tx); line-height: 1.3; }
.po {
  background: var(--card2); border-radius: var(--rs); padding: 10px 13px; margin-bottom: 7px;
  cursor: pointer; border: 1.5px solid var(--br); position: relative; overflow: hidden; transition: .15s;
}
.po:hover { border-color: var(--cel); }
.po.voted { border-color: var(--cel-d); }
.po-bar { position: absolute; left: 0; top: 0; bottom: 0; background: var(--cel-xl); transition: width .7s ease; }
.po.voted .po-bar { background: rgba(74,144,217,.18); }
.po-row { position: relative; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 500; color: var(--tx); }
.po-pct { font-weight: 700; color: var(--tx3); font-size: 11px; }
.po-pct.win { color: var(--cel-d); }
.po-meta { font-size: 10px; color: var(--tx3); margin-top: 7px; }

/* ══════════════════════════════════════════
   TRENDING
══════════════════════════════════════════ */
.tri { display: flex; align-items: flex-start; gap: 9px; padding: 8px 0; border-bottom: 1px solid var(--br); cursor: pointer; transition: .15s; }
.tri:last-child { border-bottom: none; }
.tri:hover { padding-left: 4px; }
.trnum { font-family: var(--fd); font-size: 18px; font-weight: 700; color: var(--tx3); width: 20px; flex-shrink: 0; }
.trnum.hot { color: var(--cel); }
.trn { font-size: 12px; font-weight: 500; color: var(--tx); }
.trc { font-size: 10px; color: var(--tx3); margin-top: 1px; }

/* ══════════════════════════════════════════
   RED DE PERIODISMO — Section
══════════════════════════════════════════ */
.red-hero {
  border-radius: var(--rl); overflow: hidden; margin-bottom: 22px;
  border: 2px solid var(--cel); box-shadow: var(--sh);
}

  { name:'Referente', max:99999 },

function getLevel(r) { return REP_LEVELS.find(l => r < l.max) || REP_LEVELS[REP_LEVELS.length-1]; }
function getRepPct(r) { const l=getLevel(r); if(l.max===99999)return 100; const prev=REP_LEVELS[REP_LEVELS.indexOf(l)-1]; const base=prev?prev.max:0; return Math.round((r-base)/(l.max-base)*100); }

/* ══════ POLL ══════ */
function Poll({poll}) {
  const [voted,setVoted]=useState(null);
  const [vs,setVs]=useState([...poll.vs]);
  const tot=vs.reduce((a,b)=>a+b,0);
  function vote(i){if(voted!==null)return;setVoted(i);setVs(v=>v.map((x,j)=>j===i?x+1:x));}
  return (
    <div>
      <div className="poll-q">{poll.q}</div>
      {poll.opts.map((o,i) => {
        const pct=voted!==null?Math.round(vs[i]/tot*100):null;
        const win=voted!==null&&vs[i]===Math.max(...vs);
        return (
          <div key={i} className={`po${voted===i?' voted':''}`} onClick={()=>vote(i)}>
            {pct!==null&&<div className="po-bar" style={{width:pct+'%'}}/>}
            <div className="po-row">
              <span>{o}</span>
              {pct!==null&&<span className={`po-pct${win?' win':''}`}>{pct}%</span>}
            </div>
          </div>
        );
      })}
      <div className="po-meta">{voted===null?`${tot.toLocaleString()} votos · Tocá para votar`:`✓ ${tot.toLocaleString()} votos`}</div>
    </div>
  );
}

    setThemeOpen(false);

      document.documentElement.style.setProperty('--bg','#0A0F1E');
      document.documentElement.style.setProperty('--card','#111827');
      document.documentElement.style.setProperty('--card2','#1A2340');

      ['--bg','--card','--card2','--tx','--tx2'].forEach(k=>document.documentElement.style.removeProperty(k));

          <div className="nav-sec">
            <span className="nav-lbl">Navegación</span>
            {NAV.map(n=>{const Icon=Ic[n.icon];return(
              <div key={n.id} className={`nl${page===n.id||page==='article'&&n.id==='news'?' on':''}`} onClick={()=>nav(n.id)}>
                <Icon/><span>{n.l}</span>
                {n.id==='red'&&<span className="nl-badge">5</span>}
                {n.id==='live'&&<span className="nl-badge" style={{background:'var(--red)'}}>3</span>}
              </div>
            );})}
          </div>
          <div className="nav-hr"/>
          <div className="nav-sec">
            <span className="nav-lbl">Mis equipos</span>
            {[{em:'🔴',n:'River Plate'},{em:'🔵',n:'Boca Juniors'},{em:'⚡',n:'Racing Club'},{em:'🟡',n:'Peñarol'}].map((t,i)=>(
              <div key={i} className="team-row"><span className="team-em">{t.em}</span><div className="team-nm">{t.n}</div></div>
            ))}
          </div>
          {!user.isGuest && (
            <>
              <div className="nav-hr"/>
              <div className="nav-sec">
                <span className="nav-lbl">Mi cuenta</span>
                <div style={{padding:'8px 9px',background:'var(--cel-xl)',borderRadius:'var(--rs)',border:'1px solid var(--br)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    <div className="usr-av" style={{background:user.color,width:26,height:26,fontSize:10}}>{user.av}</div>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:'var(--tx)'}}>{user.name}</div>
                      <div style={{fontSize:10,color:'var(--cel-d)'}}>{getLevel(user.rep||0).name}</div>
                    </div>
                  </div>
                  <div className="rep-bg" style={{marginTop:7,marginBottom:3}}>
                    <div className="rep-fill" style={{width:getRepPct(user.rep||0)+'%'}}/>
                  </div>
                  <div style={{fontSize:9,color:'var(--tx3)',textAlign:'right'}}>{user.rep||0} pts</div>
                </div>
              </div>
            </>
          )}
        </nav>

        {/* MAIN CONTENT */}
        <main className="main">
          <div style={{maxWidth:780, margin:'0 auto'}}>
            {page==='home' && <HomePage onNews={openNews} onNav={nav} user={user}/>}
            {page==='news' && (
              <div>
                <div className="sh"><div className="st">Noticias Deportivas</div></div>
                <div className="ng">{NEWS.map(n=><NewsCard key={n.id} n={n} onClick={()=>openNews(n)} size="big"/>)}</div>
              </div>
            )}
            {page==='article' && article && (
              <div>
                <button onClick={()=>nav('news')} style={{display:'flex',alignItems:'center',gap:5,background:'none',color:'var(--cel)',marginBottom:16,fontSize:12,fontWeight:600}}><Ic.Back style={{width:13,height:13}}/>Volver a noticias</button>
                <div style={{height:240,background:'var(--cel-xl)',borderRadius:'var(--rl)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:72,marginBottom:14,border:'2px solid var(--cel)',overflow:'hidden'}}>
                  {article.img ? <img src={article.img} alt={article.title} style={{width:'100%',height:'100%',objectFit:'cover'}}/> : <span>{article.em}</span>}
                </div>
                <span className="badge bc" style={{marginBottom:10,display:'inline-block'}}>{article.cat}</span>
                <h1 style={{fontFamily:'var(--fd)',fontSize:28,fontWeight:700,lineHeight:1.1,marginBottom:10,color:'var(--tx)'}}>{article.title}</h1>
                <div style={{fontSize:12,color:'var(--tx3)',marginBottom:18}}>{article.auth} · {article.t} · ❤ {article.l} · 💬 {article.c}</div>
                <p style={{fontFamily:'var(--fs)',fontSize:14,lineHeight:1.8,color:'var(--tx2)',marginBottom:18}}>{article.ex} El partido comenzó con un dominio claro del equipo local que propuso un juego vertical y dinámico. La apertura del marcador llegó en el minuto 23 tras una combinación magistral. El resultado refuerza el liderazgo en el campeonato y genera enorme expectativa para los próximos compromisos internacionales.</p>
                <div className="card cp" style={{marginBottom:14}}><Poll poll={POLLS[0]}/></div>
              </div>
            )}
            {page==='red' && <RedPage user={user} addToast={addToast}/>}
            {page==='stream-full' && <StreamPage onBack={()=>nav('home')}/>}
            {page==='live' && (
              <div>
                <div className="sh"><div className="st" style={{color:'var(--red)'}}><div className="ldot"/>En Vivo</div></div>
                <div className="lstrip" style={{marginBottom:16}}>
                  {LIVE_EV.map(e=>(
                    <div key={e.id} className={`lmc${e.live?' lv':''}`}>
                      <div className={`lms${e.live?' lv':''}`}>{e.live&&<><div style={{width:5,height:5,borderRadius:'50%',background:'var(--red)',animation:'pulse 1.4s infinite',display:'inline-block',marginRight:3}}/>EN VIVO · </>}{e.min}</div>
                      <div className="lmt">
                        <div className="ltm"><span className="lem">{e.sp}</span><div className="lnm">{e.h}</div></div>
                        {e.sh!==''?<div className={`lsc${e.live?' lv':''}`}>{e.sh}-{e.sa}</div>:<div style={{fontFamily:'var(--fd)',fontSize:10,color:'var(--tx3)',textAlign:'center'}}>vs</div>}
                        <div className="ltm"><span className="lem">{e.sp}</span><div className="lnm">{e.a}</div></div>
                      </div>
                    </div>
                  ))}
                </div>
                <CharlaVivo user={user} addToast={addToast}/>
              </div>
            )}
            {page==='forum' && (
              <div>
                <div className="sh"><div className="st">Debates</div><button className="btn btn-c btn-sm" onClick={()=>{if(!user||user.isGuest){addToast({msg:'Necesitás registrarte para crear un debate.',type:'err'});}else addToast({msg:'Modo de creación de hilo',type:'ok'})}}><Ic.Plus style={{width:12,height:12}}/>Nuevo hilo</button></div>
                {THREADS.map(t=>(
                  <div key={t.id} className="tc">
                    <div style={{display:'flex',gap:5,marginBottom:5,flexWrap:'wrap'}}>
                      {t.hot&&<span className="badge br-badge" style={{display:'flex',alignItems:'center',gap:2}}><Ic.Fire style={{width:9,height:9}}/>Hot</span>}
                      <span className="badge bc">{t.cat}</span>
                      <span style={{fontSize:10,color:'var(--tx3)',marginLeft:'auto'}}>{t.t}</span>
                    </div>
                    <div className="tc-tit">{t.title}</div>
                    <div className="tc-mt">
                      <div className="tc-st"><Ic.Comment/>{t.r}</div>
                      <div className="tc-st"><Ic.Eye/>{t.v}</div>
                      <div style={{marginLeft:'auto',fontSize:10,color:'var(--tx2)'}}>@{t.author}</div>
                    </div>
                  </div>
                ))}
                <div className="sh" style={{marginTop:20}}><div className="st">Encuestas rápidas</div></div>
                {POLLS.map(p=><div key={p.id} className="card cp" style={{marginBottom:12}}><Poll poll={p}/></div>)}
              </div>
            )}
            {page==='profile' && (
              <div>
                <div className="ph">
                  <div className="pav" style={{background:user.isGuest?'rgba(255,255,255,.2)':user.color}}>{user.isGuest?'?':user.av}</div>
                  <div className="pnm">{user.isGuest?'Invitado':user.name}</div>
                  <div className="pbio">{user.isGuest?'Registrate para personalizar tu perfil':'Periodista y fanático del deporte argentino 🇦🇷'}</div>
                  {user.isGuest ? (
                    <button className="btn btn-sm" style={{background:'rgba(255,255,255,.2)',border:'1.5px solid rgba(255,255,255,.5)',color:'white',borderRadius:30}} onClick={()=>setAuthOpen(true)}>Crear cuenta gratis</button>
                  ) : (
                    <div style={{display:'flex',gap:16,justifyContent:'center'}}>
                      {[{n:'12',l:'Columnas'},{n:user.rep||50,l:'Reputación'},{n:'234',l:'Seguidores'},{n:'8',l:'Charlas'}].map((s,i)=>(
                        <div key={i} className="psts" style={{gap:0,flexDirection:'column',alignItems:'center'}}>
                          <div className="psn">{s.n}</div><div className="psl">{s.l}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                {!user.isGuest && (
                  <div className="rep-card">
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,alignItems:'center'}}>
                      <div style={{fontSize:12,fontWeight:700,display:'flex',alignItems:'center',gap:5,color:'var(--tx)'}}><Ic.Trophy style={{width:14,height:14,color:'var(--sun)'}}/> Nivel: {getLevel(user.rep||0).name}</div>
                      <div style={{fontFamily:'var(--fd)',fontSize:20,fontWeight:700,color:'var(--sun)'}}>{user.rep||0} pts</div>
                    </div>
                    <div className="rep-bg"><div className="rep-fill" style={{width:getRepPct(user.rep||0)+'%'}}/></div>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--tx3)',marginTop:4}}>
                      <span>{getLevel(user.rep||0).name}</span><span>Siguiente nivel: {getLevel(user.rep||0).max} pts</span>
                    </div>
                  </div>
                )}
                <div style={{display:'flex',gap:8,marginBottom:16}}>
                  <button className="btn btn-out" style={{flex:1,justifyContent:'center'}}>Editar perfil</button>
                  <button className="btn btn-c" style={{flex:1,justifyContent:'center'}} onClick={()=>nav('red')}>Publicar columna</button>
                </div>
              </div>
            )}
          </div>
        </main>

        {/* RIGHT SIDEBAR */}
        <aside className="rsb"><RightSidebar onNav={nav}/></aside>
      </div>

      {/* MOBILE BOTTOM NAV */}
      <div className="bnav">
        {MOBILE_NAV.map(n=>{const Icon=Ic[n.icon];return(
          <div key={n.id} className={`bni${page===n.id?' on':''}`} onClick={()=>nav(n.id)}>
            <Icon/><span>{n.l}</span>
          </div>
        );})}
      </div>

      {/* AUTH MODAL */}
      {authOpen && <AuthModal onClose={()=>setAuthOpen(false)} onLogin={setUser} addToast={addToast}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
